  quizWrong: false,
  quizDone: false,
  throwing: false, // 볼 던지는 연출 중 (도망가기 잠금)
  throwsLeft: 3,   // 이번 조우에서 남은 던지기 기회 (등급별, 다 쓰면 도망감)

  ballTotal() { return CONFIG.ballOrder.reduce((s, k) => s + SAVE.balls[k], 0); },

  go() {
    if (this.ballTotal() <= 0) {
      const canBuy = SAVE.coins >= CONFIG.balls.poke.price;
      showModal(
        '<div class="m-emoji">🎒</div>' +
        '<div class="m-title">몬스터볼이 없어요!</div>' +
        '<div class="m-text">' + (canBuy ? "상점에서 몬스터볼을 사고 모험을 떠나요!" : "퀴즈를 풀어 🪙 코인을 모으고<br>상점에서 몬스터볼을 사요!") + "</div>" +
        '<div class="m-btns">' +
          (canBuy
            ? '<button class="btn yellow" data-act="modal-shop">🛍️ 상점 가기</button>'
            : '<button class="btn" data-act="modal-quiz">📖 퀴즈 풀기</button>') +
          '<button class="btn ghost" data-act="close-modal">알겠어요</button>' +
        "</div>"
      );
      return;
    }
    this.encounter();
  },

  rollRarity() {
    const roll = Math.random() * 100;
    let acc = 0;
    for (const r of ["legendary", "unique", "rare", "common"]) {
      acc += CONFIG.encounterRate[r];
      if (roll < acc) return r;
    }
    return "common";
  },

  encounter() {
    const rarity = this.rollRarity();
    let pool = RARITY_POOL[rarity];
    // soft pity: 미보유가 남아 있으면 50% 확률로 미보유 중에서
    const unowned = pool.filter(id => !SAVE.pokedex[id]);
    if (unowned.length && Math.random() < CONFIG.pityRate) pool = unowned;
    const id = pool[Math.floor(Math.random() * pool.length)];
    this.mon = { id, name: POKEMON_KO[id - 1], rarity };
    this.busy = false;
    this.imgOk = true;
    this.bonus = 0;
    this.quizWord = null; this.quizWrong = false; this.quizDone = false;
    this.throwing = false;
    this.throwsLeft = CONFIG.throwLimit[rarity];
    [gifUrl(id), spriteUrl(id)].forEach(u => { const pre = new Image(); pre.src = u; });
    showScreen("adventure");
  },

  // 타입 → 배틀 배경
  TYPE_SCENE: {
    "물": "bg-sea", "얼음": "bg-ice", "불꽃": "bg-fire", "풀": "bg-forest", "벌레": "bg-forest",
    "전기": "bg-electric", "에스퍼": "bg-psychic", "고스트": "bg-night", "악": "bg-night",
    "드래곤": "bg-dragon", "바위": "bg-rock", "땅": "bg-rock", "격투": "bg-rock", "강철": "bg-rock",
    "독": "bg-swamp",
  },
  sceneClass(id) {
    const t = (DEX_INFO[id] ? DEX_INFO[id][0] : "노말").split("·")[0];
    return this.TYPE_SCENE[t] || "bg-meadow";
  },

  // 파트너: 지정한 포켓몬(지치지 않았을 때), 아니면 가장 최근에 잡은 쌩쌩한 포켓몬
  partnerId() {
    if (SAVE.partner && SAVE.pokedex[SAVE.partner] && partnerHp(SAVE.partner) > 0) return SAVE.partner;
    const ids = Object.keys(SAVE.pokedex).map(Number).filter(id => partnerHp(id) > 0);
    if (!ids.length) return null;
    return ids.reduce((a, b) => (SAVE.pokedex[a].first >= SAVE.pokedex[b].first ? a : b));
  },

  catchPct(ballKey) {
    return Math.min(100, CONFIG.baseCatch[this.mon.rarity] + CONFIG.balls[ballKey].bonus + this.bonus);
  },

  // 남은 던지기 기회 표시 (쓴 기회는 흐리게)
  throwsLeftHtml() {
    const total = CONFIG.throwLimit[this.mon.rarity];
    let icons = "";
    for (let i = 0; i < total; i++) {
      icons += '<span style="' + (i < this.throwsLeft ? "" : "opacity:.22;filter:grayscale(1)") + '">' + ballIcon("poke", 20) + "</span>";
    }
    return '<div class="throw-left">던질 수 있는 기회 ' + icons + "</div>";
  },

  ballRowHtml() {
    return this.throwsLeftHtml() + '<div class="ball-row">' + CONFIG.ballOrder.map(k => {
      const b = CONFIG.balls[k];
      const n = SAVE.balls[k];
      const pct = this.catchPct(k);
      const cls = pct >= 70 ? "pct-good" : pct >= 40 ? "pct-mid" : "pct-bad";
      return '<button class="ball-btn' + (n > 0 ? "" : " none") + '" data-throw="' + k + '">' +
        '<span class="bi">' + ballIcon(k, 34) + "</span>" +
        '<span class="bn">' + b.name + " × " + n + "</span>" +
        '<span class="bp ' + cls + '">잡을 확률 ' + pct + "%" + (this.bonus ? ' <span class="pct-up">⬆️</span>' : "") + "</span>" +
        "</button>";
    }).join("") + "</div>";
  },

  // 조우 영어 시험: 첫 시도 정답이면 이번 조우 동안 포획 확률 +15%p (코인 없음)
  // 자주 틀린 단어가 있으면 70% 확률로 그중에서 출제 (자동 복습)
  startQuiz() {
    const weak = reviewPool();
    let w, isReview = false;
    if (weak.length && Math.random() < 0.7) {
      w = weak[Math.floor(Math.random() * Math.min(weak.length, 10))];
      isReview = true;
    } else {
      w = activeWords()[Math.floor(Math.random() * activeWords().length)];
    }
    const listenMode = TTS.ok && SAVE.settings.tts && Math.random() < 0.4;
    this.quizWord = w; this.quizWrong = false; this.quizDone = false;
    const choices = shuffle([w, ...pickN(activeWords().filter(x => x.id !== w.id), 2)]);
    typeText($("#battle-dialog"), isReview
      ? "야생 " + this.mon.name + "의 복습 시험이다! 📝"
      : "야생 " + this.mon.name + "의 영어 시험이다!");
    const pid = this.partnerId();
    const title = isReview
      ? "📝 전에 틀렸던 단어예요!" + (pid ? " 맞히면 " + josa(POKEMON_KO[pid - 1], "이가") + " 기술을 쓴다 ⬆️" : "")
      : (pid ? "맞히면 " + josa(POKEMON_KO[pid - 1], "이가") + " 기술을 쓴다! ⬆️" : "영어 시험을 통과해 보자!");
    const controls = $("#adv-controls");
    controls.innerHTML =
      '<div class="battle-quiz">' +
        '<div class="bq-title">' + esc(title) + "</div>" +
        '<div class="bq-prompt">' +
          (listenMode
            ? '<button class="speak-btn" id="bq-speak" style="width:54px;height:54px;font-size:25px">🔊</button><span class="bqk">잘 듣고 골라요!</span>'
            : '<span class="bqe">' + emojiHtml(w) + '</span><span class="bqk">' + esc(w.ko) + "</span>") +
        "</div>" +
        '<div class="choices">' + choices.map(c => listenMode
          ? '<button class="choice" data-bq="' + c.id + '"><span class="em" style="font-size:26px">' + emojiHtml(c) + '</span><span class="ko">' + esc(c.ko) + "</span></button>"
          : '<button class="choice" data-bq="' + c.id + '"><span class="en">' + esc(c.en) + "</span></button>"
        ).join("") + "</div>" +
      "</div>";
    controls.classList.remove("hidden");
    $("#adv-flee").classList.remove("hidden"); // 포켓몬이 보이면 언제든 도망 가능 (중복 스킵용)
    if (listenMode) {
      $("#bq-speak").addEventListener("click", () => { SFX.tap(); TTS.speak(w.en); });
      later(() => TTS.speak(w.en), 350);
    }
  },

  // 플레이어가 도망가기: 볼 소모 없이 조우 종료 → 다음 포켓몬
  playerFlee() {
    if (this.throwing) return;
    this.quizDone = true;
    this.busy = true;
    SFX.escape();
    SFX.bgmStop();
    Cry.stop();
    const img = $("#adv-mon") && $("#adv-mon").querySelector("img, .fallback");
    if (img) img.classList.add("fleeing");
    typeText($("#battle-dialog"), "무사히 도망쳤다!");
    later(() => {
      const ballsLeft = this.ballTotal();
      showModal(
        '<div class="m-emoji">🏃💨</div>' +
        '<div class="m-title">무사히 도망쳤다!</div>' +
        '<div class="m-text">' + esc(josa(this.mon.name, "이가")) + " 풀숲으로 사라졌어요.<br>다음 포켓몬을 찾아보자!</div>" +
        '<div class="m-btns" style="flex-direction:column">' +
          (ballsLeft > 0
            ? '<button class="btn red" data-act="modal-adventure">🌿 다음 포켓몬 찾기 (' + ballsLeft + "개)</button>"
            : (SAVE.coins >= CONFIG.balls.poke.price
              ? '<button class="btn yellow" data-act="modal-shop">🛍️ 상점 가기</button>'
              : '<button class="btn" data-act="modal-quiz">📖 퀴즈로 코인 모으기</button>')) +
          '<button class="btn ghost" data-act="modal-home">🏠 홈으로</button>' +
        "</div>"
      );
    }, 650);
  },

  // 파트너 고유 기술 연출: 런지 → 타입 발사체 → 명중(흔들림+💥) → HP 감소
  partnerAttack(pid, totalBonus, done) {
    const scene = $("#adv-scene");
    const allyEl = $("#adv-ally");
    const monEl = $("#adv-mon");
    const dex = DEX_INFO[pid];
    const moveName = dex ? dex[1].split(" · ")[0] : "몸통박치기";
    const fx = TYPE_FX[(dex ? dex[0] : "노말").split("·")[0]] || "💥";
    typeText($("#battle-dialog"), POKEMON_KO[pid - 1] + "의 " + moveName + "!");
    SFX.attack();
    if (allyEl) {
      allyEl.classList.add("ally-attack");
      later(() => allyEl.classList.remove("ally-attack"), 500);
    }
    later(() => {
      const p = document.createElement("div");
      p.className = "fx-projectile";
      p.textContent = fx;
      scene.appendChild(p);
      const sr = scene.getBoundingClientRect();
      const er = monEl.getBoundingClientRect();
      const ar = allyEl ? allyEl.getBoundingClientRect() : null;
      const sx = ar ? (ar.left - sr.left + ar.width * 0.7) : sr.width * 0.2;
      const sy = ar ? (ar.top - sr.top + 8) : sr.height * 0.6;
      p.style.left = sx + "px";
      p.style.top = sy + "px";
      const dx = (er.left - sr.left + er.width / 2) - sx;
      const dy = (er.top - sr.top + er.height / 2) - sy;
      requestAnimationFrame(() => { p.style.transform = "translate(" + dx + "px," + dy + "px) scale(1.4)"; });
      later(() => {
        p.remove();
        SFX.hit();
        const img = monEl.querySelector("img, .fallback");
        if (img) { img.classList.add("enemy-hit"); later(() => img.classList.remove("enemy-hit"), 600); }
        const burst = document.createElement("div");
        burst.className = "hit-burst";
        burst.textContent = "💥";
        monEl.appendChild(burst);
        later(() => burst.remove(), 600);
        const hp = $("#enemy-hp");
        if (hp) hp.style.width = Math.max(20, 100 - totalBonus * 3) + "%";
        later(done, 650);
      }, 480);
    }, 400);
  },

  bqAnswer(btn) {
    if (this.quizDone) return;
    const id = Number(btn.dataset.bq);
    const dialog = $("#battle-dialog");
    if (id !== this.quizWord.id) {
      if (!this.quizWrong) {
        this.quizWrong = true;
        SAVE.stats.totalAnswered++;
        noteWordResult(this.quizWord.id, false);
      }
      SFX.wrong();
      btn.classList.add("wrong");
      typeText(dialog, "앗, 빗나갔다! 다시 골라 보자!");
      return;
    }
    this.quizDone = true;
    btn.classList.add("right");
    TTS.speak(this.quizWord.en);
    const showBallRow = (delay) => later(() => {
      typeText(dialog, "어떤 볼을 던질까?");
      $("#adv-controls").innerHTML = this.ballRowHtml();
      this.busy = false;
    }, delay);

    if (!this.quizWrong) {
      SAVE.stats.totalAnswered++;
      SAVE.stats.totalCorrect++;
      noteWordResult(this.quizWord.id, true);
      SFX.combo();
      const pid = this.partnerId();
      // 보너스는 파트너 등급에서만 (기본 보너스 없음)
      this.bonus = pid ? CONFIG.partnerBonus[rarityOf(pid)] : 0;
      if (pid) {
        // 파트너가 고유 기술 시전! (등급이 높을수록 보너스 큼) → HP -10%
        later(() => this.partnerAttack(pid, this.bonus, () => {
          const hpLeft = drainPartner(pid);
          const fill = $("#ally-hp-fill");
          if (fill) {
            fill.style.width = hpLeft + "%";
            fill.classList.toggle("low", hpLeft <= 30);
          }
          typeText(dialog, "효과는 굉장했다! 잡을 확률 +" + this.bonus + "% ⬆️");
          if (hpLeft <= 0) {
            later(() => toast(josa(POKEMON_KO[pid - 1], "은는") + " 지쳤어요 😴 다음엔 다른 파트너와 함께해요! (내일 회복)", 3200), 1300);
          }
          showBallRow(1400);
        }), 600);
        typeText(dialog, "정답!");
      } else {
        typeText(dialog, "정답! 포켓몬을 잡으면 파트너가 기술로 도와줄 거야!");
        showBallRow(1800);
      }
    } else {
      SFX.correct();
      typeText(dialog, "정답! 다음엔 한 번에 맞혀 보자!");
      showBallRow(1500);
    }
  },

  render(el) {
    const m = this.mon;
    const info = CONFIG.rarityInfo[m.rarity];
    const pid = this.partnerId();
    const stars = m.rarity === "legendary"
      ? '<div class="star-overlay">' +
        [[8,12],[30,6],[55,15],[75,8],[88,22],[18,28]].map((p, i) =>
          '<span style="left:' + p[0] + "%;top:" + p[1] + "%;animation-delay:" + (i * 0.3) + 's">✨</span>').join("") +
        "</div>"
      : "";
    el.innerHTML =
      '<div class="topbar">' +
        '<button class="icon-btn" data-act="go-home">🏠</button>' +
        '<span class="chip">🪙 ' + SAVE.coins + "</span>" +
        '<span class="spacer"></span>' +
        '<span class="chip">야생 포켓몬 출현!</span>' +
      "</div>" +
      '<div class="adv-scene ' + this.sceneClass(m.id) + '" id="adv-scene">' +
        stars +
        '<div class="battle-platform platform-enemy"></div>' +
        '<div class="battle-platform platform-ally"></div>' +
        '<div class="grass-patch" id="grass-patch">🌿</div>' +
        '<div class="adv-enemy hidden" id="adv-mon">' +
          '<img data-mid="' + m.id + '" src="' + gifUrl(m.id) + '" alt="" onerror="advImgFail(this)">' +
        "</div>" +
        '<div class="nameplate hidden" id="nameplate">' +
          '<div class="np-name">' + esc(m.name) + ' <span class="rarity-badge ' + info.badge + '">' + info.ko + "</span>" +
            (SAVE.pokedex[m.id]
              ? ' <span class="rarity-badge rb-common">✔ 있음</span>'
              : ' <span class="rarity-badge rb-unique">NEW!</span>') + "</div>" +
          '<div>' + typeChipsHtml(m.id) + "</div>" +
          '<div class="hpwrap"><span class="hplabel">HP</span><div class="hpbar"><i id="enemy-hp"></i></div></div>' +
        "</div>" +
        (pid
          ? '<div class="adv-ally hidden" id="adv-ally">' +
            '<img data-mid="' + pid + '" src="' + gifBackUrl(pid) + '" alt="" onerror="allyImgFail(this)">' +
            '<div class="ally-label">' + esc(POKEMON_KO[pid - 1]) + "</div>" +
            '<div class="ally-hp"><i id="ally-hp-fill" class="' + (partnerHp(pid) <= 30 ? "low" : "") + '" style="width:' + partnerHp(pid) + '%"></i></div>' +
            "</div>"
          : "") +
        '<div class="battle-dialog" id="battle-dialog"></div>' +
      "</div>" +
      '<div id="adv-controls" class="hidden">' + this.ballRowHtml() + "</div>" +
      '<div id="adv-flee" class="hidden" style="text-align:center;margin-top:10px">' +
        '<button class="btn ghost" data-act="player-flee" style="font-size:15px;padding:10px 18px">🏃 도망가기 (다른 포켓몬 찾기)</button>' +
      "</div>";

    // 인카운터 연출: 부스럭 → 등장 → 볼 선택
    this.busy = true;
    typeText($("#battle-dialog"), "부스럭... 부스럭...");
    later(() => {
      $("#grass-patch").classList.add("hidden");
      $("#adv-mon").classList.remove("hidden");
      $("#nameplate").classList.remove("hidden");
      const ally = $("#adv-ally");
      if (ally) ally.classList.remove("hidden");
      Cry.play(m.id); // 진짜 울음소리로 등장!
      if (m.rarity === "legendary") SFX.fanfare("legendary");
      SFX.bgmStart();
      typeText($("#battle-dialog"), "앗! 야생 " + josa(m.name, "이가") + " 나타났다!");
    }, 1400);
    later(() => this.startQuiz(), 3000);
    if (!pid && Object.keys(SAVE.pokedex).length) {
      later(() => toast("파트너들이 모두 지쳐서 쉬고 있어요 😴 내일이면 회복돼요!", 3000), 3200);
    }

    el.addEventListener("click", (e) => {
      const bq = e.target.closest("[data-bq]");
      if (bq && !bq.classList.contains("wrong")) { this.bqAnswer(bq); return; }
      const bb = e.target.closest("[data-throw]");
      if (bb && !this.busy) this.throwBall(bb.dataset.throw);
    });
  },

  throwBall(ballKey) {
    if (SAVE.balls[ballKey] <= 0) return;
    this.busy = true;
    this.throwing = true;
    const fleeBtn = $("#adv-flee");
    if (fleeBtn) { fleeBtn.style.opacity = ".35"; fleeBtn.style.pointerEvents = "none"; }
    SAVE.balls[ballKey]--;
    myEco().used[ballKey]++;
    saveNow();
    const pct = this.catchPct(ballKey);
    const success = Math.random() * 100 < pct;
    const m = this.mon;
    const scene = $("#adv-scene");
    const monEl = $("#adv-mon");
    const dialog = $("#battle-dialog");
    const controls = $("#adv-controls");
    controls.style.opacity = ".35";
    controls.style.pointerEvents = "none";
    typeText(dialog, CONFIG.balls[ballKey].name + " 던진다~!");
    SFX.throwBall();

    // 1) 볼 날아가기: 아군 자리 → 상대 위치로 (JS 계산 포물선)
    const ball = document.createElement("div");
    ball.className = "battle-ball";
    ball.innerHTML = ballIcon(ballKey, 34);
    scene.appendChild(ball);
    const sr = scene.getBoundingClientRect();
    const er = monEl.getBoundingClientRect();
    const sx = sr.width * 0.16, sy = sr.height * 0.62;
    ball.style.left = sx + "px";
    ball.style.top = sy + "px";
    const dx = (er.left - sr.left + er.width / 2) - sx - 17;
    const dy = (er.top - sr.top + er.height / 2) - sy - 17;
    requestAnimationFrame(() => { ball.style.transform = "translate(" + dx + "px," + dy + "px) rotate(720deg)"; });

    later(() => {
      // 2) 포켓몬이 볼 속으로 빨려 들어감
      ball.remove();
      const img = monEl.querySelector("img, .fallback");
      if (img) img.classList.add("sucked");
      later(() => {
        const wob = document.createElement("div");
        wob.className = "wobbling";
        wob.innerHTML = ballIcon(ballKey, 54);
        monEl.appendChild(wob);
        typeText(dialog, "두근두근…");
        const shakes = m.rarity === "common" ? 1 : m.rarity === "rare" ? 2 : 3;
        for (let i = 0; i < shakes; i++) later(() => SFX.shake(), 250 + i * 700);
        later(() => {
          wob.remove();
          if (success) this.caught(monEl, dialog);
          else this.escaped(monEl, dialog, controls);
        }, 400 + shakes * 750);
      }, 380);
    }, 700);
  },

  caught(monEl, dialog) {
    const m = this.mon;
    const isNew = !SAVE.pokedex[m.id];
    const wasLineComplete = evoLineComplete(m.id);
    const entry = SAVE.pokedex[m.id] || { count: 0, first: Date.now() };
    entry.count++;
    SAVE.pokedex[m.id] = entry;
    this.lineJustCompleted = !wasLineComplete && evoLineComplete(m.id);
    SAVE.stats.caught++;
    if (!SAVE.partner) SAVE.partner = m.id; // 첫 포켓몬은 자동으로 파트너
    saveNow();
    SFX.bgmStop();
    SFX.click();
    typeText(dialog, "찰칵! " + josa(m.name, "을를") + " 잡았다!!");
    const still = document.createElement("div");
    still.className = "catch-flash";
    still.innerHTML = ballIcon("poke", 54);
    monEl.appendChild(still);
    later(() => SFX.catchOk(), 250);
    later(() => {
      SFX.fanfare(m.rarity);
      if (m.rarity === "legendary" || m.rarity === "unique") fxConfetti(["🌟","✨","🎆","💫"], 20);

          controls.innerHTML =

/* ================================================================
   [S18.5] 가족 동기화 + 가족 톡
   - 가족 코드 하나로 여러 기기(아이 패드/부모 패드)가 같은 진행을 공유
   - 코인·볼은 기기별 누적 카운터 합산이라 동시에 놀아도 안 꼬임
   - 로컬 저장이 항상 우선: 인터넷이 끊겨도 게임은 정상, 연결되면 자동 병합
================================================================ */
function chatRole() { return SAVE.mode === "parent" ? "parent" : "kid"; }

const Family = {
  LKEY: "engmon_family_v1",
  st: { code: null, chatReadT: 0 },
  pollTimer: null, syncTimer: null, syncing: false, lastUnread: 0,

  enabled() { return !!CLOUD_DB_URL; },
  linked() { return this.enabled() && !!this.st.code; },

  init() {
    try { Object.assign(this.st, JSON.parse(localStorage.getItem(this.LKEY)) || {}); } catch (e) {}
    if (this.linked()) {
      setTimeout(() => this.sync(), 1200);
      this.startPoll();
    }
  },
  saveSt() { try { localStorage.setItem(this.LKEY, JSON.stringify(this.st)); } catch (e) {} },
  url(code) { return CLOUD_DB_URL.replace(/\/+$/, "") + "/families/" + code + ".json"; },
  genCode() {
    const c = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
    let s = "";
    for (let i = 0; i < 6; i++) s += c[Math.floor(Math.random() * c.length)];
    return s;
  },

  packLocal() {
    return {
      updatedAt: Date.now(),
      eco: SAVE.eco, pokedex: SAVE.pokedex, wordStats: SAVE.wordStats,
      stats: SAVE.stats, partnerHp: SAVE.partnerHp, partner: SAVE.partner,
      chat: SAVE.chat || [],
    };
  },

  // 두 저장본 병합 — 카운터는 max(단조증가), 도감·기록은 합집합, 채팅은 중복 제거 합집합
  merge(a, b) {
    const mx = (x, y) => Math.max(x || 0, y || 0);
    const m = { updatedAt: mx(a.updatedAt, b.updatedAt) };
    m.eco = {};
    new Set(Object.keys(a.eco || {}).concat(Object.keys(b.eco || {}))).forEach(d => {
      const ea = (a.eco || {})[d] || emptyEco();
      const eb = (b.eco || {})[d] || emptyEco();
      const e = emptyEco();
      e.earned = mx(ea.earned, eb.earned);
      e.spent = mx(ea.spent, eb.spent);
      CONFIG.ballOrder.forEach(k => {
        e.bought[k] = mx(ea.bought && ea.bought[k], eb.bought && eb.bought[k]);
        e.used[k] = mx(ea.used && ea.used[k], eb.used && eb.used[k]);
      });
      m.eco[d] = e;
    });
    m.pokedex = {};
    new Set(Object.keys(a.pokedex || {}).concat(Object.keys(b.pokedex || {}))).forEach(id => {
      const pa = (a.pokedex || {})[id], pb = (b.pokedex || {})[id];
      m.pokedex[id] = {
        count: mx(pa && pa.count, pb && pb.count),
        first: Math.min(pa ? pa.first : Infinity, pb ? pb.first : Infinity),
      };
    });
    m.wordStats = {};
    new Set(Object.keys(a.wordStats || {}).concat(Object.keys(b.wordStats || {}))).forEach(id => {
      const wa = (a.wordStats || {})[id] || {}, wb = (b.wordStats || {})[id] || {};
      m.wordStats[id] = { w: mx(wa.w, wb.w), c: mx(wa.c, wb.c) };
    });
    const sa = a.stats || {}, sb = b.stats || {};
    m.stats = {
      totalAnswered: mx(sa.totalAnswered, sb.totalAnswered),
      totalCorrect: mx(sa.totalCorrect, sb.totalCorrect),
      bestCombo: mx(sa.bestCombo, sb.bestCombo),
      caught: mx(sa.caught, sb.caught),
      gamesPlayed: {
        quiz: mx(sa.gamesPlayed && sa.gamesPlayed.quiz, sb.gamesPlayed && sb.gamesPlayed.quiz),
        chain: mx(sa.gamesPlayed && sa.gamesPlayed.chain, sb.gamesPlayed && sb.gamesPlayed.chain),
        memory: mx(sa.gamesPlayed && sa.gamesPlayed.memory, sb.gamesPlayed && sb.gamesPlayed.memory),
      },
    };
    m.partnerHp = {};
    new Set(Object.keys(a.partnerHp || {}).concat(Object.keys(b.partnerHp || {}))).forEach(id => {
      const ha = (a.partnerHp || {})[id], hb = (b.partnerHp || {})[id];
      m.partnerHp[id] = (!hb || (ha && ha.t >= hb.t)) ? ha : hb;
    });
    m.partner = ((a.updatedAt || 0) >= (b.updatedAt || 0) ? (a.partner || b.partner) : (b.partner || a.partner)) || null;
    const seen = new Set();
    const chat = [];
    (a.chat || []).concat(b.chat || []).forEach(msg => {
      if (!msg || !msg.t) return;
      const k = msg.t + "|" + msg.f + "|" + msg.x;
      if (!seen.has(k)) { seen.add(k); chat.push(msg); }
    });
    chat.sort((x, y) => x.t - y.t);
    m.chat = chat.slice(-200);
    return m;
  },

  applyDoc(m) {
    SAVE.eco = m.eco;
    SAVE.pokedex = m.pokedex;
    SAVE.wordStats = m.wordStats;
    SAVE.stats = m.stats;
    SAVE.partnerHp = m.partnerHp;
    SAVE.partner = m.partner;
    SAVE.chat = m.chat;
    applyEco();
    Storage.save(SAVE); // saveNow()는 queueSync를 또 부르므로 직접 저장
    const chip = $("#coin-chip");
    if (chip) chip.textContent = SAVE.coins;
    this.updateBadges();
  },

  async sync(showErrors) {
    if (!this.linked() || this.syncing) return false;
    this.syncing = true;
    try {
      const r = await fetch(this.url(this.st.code));
      if (!r.ok) throw new Error("HTTP " + r.status);
      const remote = await r.json(); // 없으면 null
      const merged = this.merge(this.packLocal(), remote || {});
      this.applyDoc(merged);
      await fetch(this.url(this.st.code), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(merged),
      });
      return true;
    } catch (e) {
      if (showErrors) toast("연결이 안 돼요. 인터넷을 확인해 주세요 📶");
      return false;
    } finally {
      this.syncing = false;
    }
  },

  queueSync() {
    if (!this.linked()) return;
    clearTimeout(this.syncTimer);
    this.syncTimer = setTimeout(() => this.sync(), 2500);
  },
  startPoll() {
    clearInterval(this.pollTimer);
    if (this.linked()) this.pollTimer = setInterval(() => this.sync(), 45000);
  },

  async createFamily() {
    const code = this.genCode();
    await fetch(this.url(code), {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(this.merge(this.packLocal(), {})),
    });
    this.st.code = code;
    this.saveSt();
    this.startPoll();
    return code;
  },
  async joinFamily(code) {
    const r = await fetch(this.url(code));
    if (!r.ok) throw new Error("HTTP " + r.status);
    const remote = await r.json();
    if (!remote) throw new Error("no such family");
    this.st.code = code;
    this.saveSt();
    await this.sync();
    this.startPoll();
  },
  unlink() {
    this.st.code = null;
    this.saveSt();
    clearInterval(this.pollTimer);
  },

  unread() {
    const my = chatRole();
    return (SAVE.chat || []).filter(msg => msg.t > (this.st.chatReadT || 0) && msg.f !== my).length;
  },
  markRead() {
    this.st.chatReadT = Date.now();
    this.saveSt();
    this.updateBadges();
  },
  updateBadges() {
    const n = this.unread();
    document.querySelectorAll(".chat-badge").forEach(b => {
      b.textContent = "+" + n;
      b.classList.toggle("hidden", n === 0);
    });
    if (n > this.lastUnread && currentScreen === "chat") {
      renderChatList(); // 채팅 화면을 보고 있으면 바로 갱신
      this.markRead();
    } else if (n > this.lastUnread && currentScreen !== "chat") {
      toast("💬 새 가족 톡이 도착했어요!", 2200);
    }
    this.lastUnread = this.unread();
  },
};

  el.innerHTML = topbarHtml({ home: true }) + '<div class="page-title">☁️ 가족 함께하기</div>' + body;
  Family.updateBadges();
};

/* ---- 가족 톡 화면 ---- */
const CHAT_STAMPS = ["🎉 포켓몬 잡았어!", "📖 오늘 공부 다 했어요", "👍 잘했어!", "❤️ 사랑해", "🌈 진화 완성했어!", "🎁 볼 사놨어"];

function chatMsgsHtml() {
  const my = chatRole();
  if (!(SAVE.chat || []).length) {
    return '<div class="prompt-hint" style="text-align:center;padding:30px 10px">아직 메시지가 없어요.<br>첫 메시지를 남겨 보세요! 💬</div>';
  }
  return SAVE.chat.map(m => {
    const mine = m.f === my;
    const who = m.f === "parent" ? "🧑 부모" : "👶 아이";
    const d = new Date(m.t);
    const time = (d.getMonth() + 1) + "/" + d.getDate() + " " + String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
    return '<div class="bubble ' + (mine ? "me" : "them") + '">' + esc(m.x) +
      '<div class="meta">' + who + " · " + time + "</div></div>";
  }).join("");
}
function renderChatList() {
  const list = $("#chat-list");
  if (!list) return;
  list.innerHTML = chatMsgsHtml();
  list.scrollTop = list.scrollHeight;
}
function sendChat(text) {
  const x = String(text || "").trim().slice(0, 120);
  if (!x) return;
  (SAVE.chat = SAVE.chat || []).push({ f: chatRole(), x, t: Date.now() });
  Storage.save(SAVE);
  SFX.tap();
  renderChatList();
  Family.markRead();
  Family.sync();
}

Screens.chat = (el) => {
  el.innerHTML =
    topbarHtml({ home: true }) +
    '<div class="page-title">💬 가족 톡 <span class="prompt-hint" style="margin-left:6px">(' + (chatRole() === "parent" ? "🧑 부모" : "👶 아이") + ' 로 보내는 중)</span>' +
      '<button class="icon-btn" data-act="go-family" style="margin-left:auto" aria-label="가족 설정">⚙️</button></div>' +
    '<div class="chat-list" id="chat-list"></div>' +
    '<div class="chat-stamps">' + CHAT_STAMPS.map(s => '<button class="stamp" data-stamp="' + esc(s) + '">' + esc(s) + "</button>").join("") + "</div>" +
    '<div class="chat-inputrow">' +
      '<input id="chat-input" maxlength="120" placeholder="메시지를 써 보세요" enterkeyhint="send">' +
      '<button class="btn" id="chat-send">보내기</button>' +
    "</div>";
  renderChatList();
  Family.markRead();
  $("#chat-send").addEventListener("click", () => { sendChat($("#chat-input").value); $("#chat-input").value = ""; });
  $("#chat-input").addEventListener("keydown", e => {
    if (e.key === "Enter") { sendChat($("#chat-input").value); $("#chat-input").value = ""; }
  });
  el.querySelectorAll(".stamp").forEach(b => b.addEventListener("click", () => sendChat(b.dataset.stamp)));
  // 화면을 보는 동안 15초마다 새 메시지 확인
  screenTimers.push(setInterval(() => Family.sync(), 15000));
};

/* ================================================================
   [S19] 초기화 + 데이터 자가검증
================================================================ */
(function validateData() {
  // 1) 두 단어 세트 공통 검증: 중복 영단어 / 카테고리 키 / 끝말잇기 체인 커버리지
  Object.entries(WORD_SETS).forEach(([name, set]) => {
    const seen = new Set();
    const dups = [];
    set.words.forEach(w => { if (seen.has(w.en)) dups.push(w.en); seen.add(w.en); });
    console.assert(dups.length === 0, "[" + name + "] 중복 영단어:", dups);
    console.log("[잉글리시몬:" + name + "] 단어 " + set.words.length + "개, 카테고리 " + set.categories.length + "개");

    const catKeys = new Set(set.categories.map(c => c.key));
    const badCat = set.words.filter(w => !catKeys.has(w.cat));
    console.assert(badCat.length === 0, "[" + name + "] 잘못된 카테고리:", badCat);

    const endCount = {};
    set.words.forEach(w => { const l = lastLetter(w); endCount[l] = (endCount[l] || 0) + 1; });
    const weak = [];
    Object.keys(endCount).forEach(l => {
      const starters = (set.startIndex[l] || []).length;
      if (starters < 2) weak.push(l + "(끝:" + endCount[l] + "/시작:" + starters + ")");
    });
    if (weak.length) console.warn("[체인:" + name + "] 시작 단어가 적은 끝글자(자동 리셋으로 처리됨):", weak.join(", "));
    const safeCount = set.words.filter(w => chainSafe(w, set.startIndex)).length;
    console.log("[체인:" + name + "] 제시어 가능 단어 " + safeCount + "/" + set.words.length);
  });
  console.assert(WORDS_ADULT.length === 500, "[parent] 단어 수 오류:", WORDS_ADULT.length);
  console.assert(WORDS_ADULT.every(w => w.id >= 1001), "[parent] id 범위 오류");

  // 4) 포켓몬 데이터
  console.assert(POKEMON_KO.length === TOTAL_POKEMON, "[포켓몬] 이름 수 오류:", POKEMON_KO.length);
  const poolSum = Object.values(RARITY_POOL).reduce((s, a) => s + a.length, 0);
  console.assert(poolSum === TOTAL_POKEMON, "[포켓몬] 희귀도 분류 합계 오류:", poolSum);
  const dexMissing = [];
  for (let i = 1; i <= TOTAL_POKEMON; i++) {
    if (!DEX_INFO[i]) { dexMissing.push(i); continue; }
    DEX_INFO[i][0].split("·").forEach(t => { if (!TYPE_COLORS[t]) dexMissing.push(i + ":" + t); });
  }
  console.assert(dexMissing.length === 0, "[포켓몬] 도감 설명 누락/타입 오타:", dexMissing);
  const evoBad = [];
  const evoSeen = new Set();
  EVO_LINES.forEach(line => line.forEach(id => {
    if (id < 1 || id > TOTAL_POKEMON) evoBad.push(id);
    if (evoSeen.has(id)) evoBad.push("dup:" + id);
    evoSeen.add(id);
  }));
  console.assert(evoBad.length === 0, "[진화] 라인 데이터 오류:", evoBad);
  console.log("[진화] 라인 " + EVO_LINES.length + "개, 포함 포켓몬 " + evoSeen.size + "마리");
  console.log("[포켓몬] 일반 " + RARITY_POOL.common.length + " / 레어 " + RARITY_POOL.rare.length +
    " / 유니크 " + RARITY_POOL.unique.length + " / 전설 " + RARITY_POOL.legendary.length);

  // 5) 조우 확률 합계
  const encSum = Object.values(CONFIG.encounterRate).reduce((a, b) => a + b, 0);
  console.assert(encSum === 100, "[확률] 조우 확률 합계 오류:", encSum);
})();

document.addEventListener("contextmenu", e => e.preventDefault());
Family.init();
showScreen("home");

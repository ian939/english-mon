<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>잉글리시몬 — 영어 단어 모험</title>
<!--
  잉글리시몬: 초등 1학년 영어 단어 학습 게임 (단일 HTML 파일)
  - 개인·가정 교육용. 포켓몬 이미지는 PokeAPI 스프라이트(온라인)를 사용하며 배포/상업적 이용 금지.
  - file:// 로 더블클릭 실행 가능. 저장은 localStorage (폴더를 옮기면 저장이 초기화될 수 있음).
-->
<style>
:root {
  --bg1: #aee3ff;
  --bg2: #d8f3ff;
  --card: #ffffff;
  --ink: #2d3a4a;
  --ink-soft: #6b7a8c;
  --accent: #ff5a5f;
  --accent2: #ffb703;
  --good: #2ec46f;
  --bad: #ff5a5f;
  --blue: #3d8bfd;
  --purple: #9b5de5;
  --shadow: 0 6px 0 rgba(45,58,74,.12), 0 10px 24px rgba(45,58,74,.10);
  --radius: 22px;
  --font: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  color: var(--ink);
  background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 55%, #eafaf1 100%);
  background-attachment: fixed;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  overflow-x: hidden;
}
img { -webkit-user-drag: none; }

#app {
  max-width: 620px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 12px 14px 28px;
  display: flex;
  flex-direction: column;
}
.screen { animation: screenIn .28s ease-out both; flex: 1; display: flex; flex-direction: column; }
@keyframes screenIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

/* ===== 상단 바 ===== */
.topbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.topbar .spacer { flex: 1; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--card); border-radius: 999px; padding: 7px 13px;
  font-weight: 800; font-size: 16px; box-shadow: var(--shadow);
  white-space: nowrap;
}
.chip small { font-weight: 700; color: var(--ink-soft); font-size: 12px; }
.icon-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none;
  background: var(--card); box-shadow: var(--shadow);
  font-size: 20px; cursor: pointer; flex: 0 0 auto;
  display: inline-flex; align-items: center; justify-content: center;
  transition: transform .1s;
}
.icon-btn:active { transform: scale(.9); }
.icon-btn.off { opacity: .45; filter: grayscale(1); }

/* ===== 공용 버튼 ===== */
.btn {
  font-family: var(--font);
  border: none; cursor: pointer;
  border-radius: var(--radius);
  font-weight: 800; color: #fff;
  background: var(--blue);
  box-shadow: 0 5px 0 rgba(0,0,0,.18);
  transition: transform .08s, box-shadow .08s, filter .15s;
  padding: 14px 20px; font-size: 18px;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,.18); }
.btn:disabled { filter: grayscale(.7) opacity(.55); pointer-events: none; }
.btn.green { background: var(--good); }
.btn.red { background: var(--accent); }
.btn.yellow { background: var(--accent2); color: #6b4a00; }
.btn.purple { background: var(--purple); }
.btn.ghost { background: var(--card); color: var(--ink); box-shadow: var(--shadow); }
.btn.big { font-size: 22px; padding: 18px 24px; border-radius: 26px; }
.btn.wide { width: 100%; }

/* ===== 홈 화면 ===== */
.home-title {
  text-align: center; margin: 10px 0 2px;
  font-size: clamp(34px, 9vw, 46px); font-weight: 900; letter-spacing: -1px;
  color: #1f3550;
  text-shadow: 0 3px 0 #fff, 0 6px 14px rgba(31,53,80,.18);
}
.home-title .mon { color: var(--accent); }
.home-sub { text-align: center; color: var(--ink-soft); font-weight: 700; margin-bottom: 14px; font-size: 15px; }
.home-hero { text-align: center; font-size: clamp(56px, 16vw, 84px); margin: 4px 0 10px; animation: heroBob 2.4s ease-in-out infinite; }
@keyframes heroBob { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-10px) } }
.home-menu { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
.mode-btn {
  display: flex; align-items: center; gap: 14px; text-align: left;
  background: var(--card); border: none; cursor: pointer;
  border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow);
  transition: transform .1s;
}
.mode-btn:active { transform: scale(.97); }
.mode-btn .mi { font-size: 34px; width: 56px; height: 56px; border-radius: 18px; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.mode-btn .mt { font-size: 19px; font-weight: 900; }
.mode-btn .md { font-size: 13px; color: var(--ink-soft); font-weight: 600; margin-top: 2px; }
.mode-btn .arrow { margin-left: auto; font-size: 20px; color: #c3ced9; }
.mode-btn.adventure { background: linear-gradient(135deg, #fff6e5, #ffe9c7); }
.mode-btn.locked { filter: grayscale(.9); opacity: .55; }
.mode-btn.locked .arrow { font-size: 16px; color: #8fa1b3; }
.mode-btn.pulse { animation: pulseGlow 1.6s ease-in-out infinite; }
@keyframes pulseGlow {
  0%,100% { box-shadow: var(--shadow); }
  50% { box-shadow: 0 6px 0 rgba(255,90,95,.25), 0 0 0 6px rgba(255,183,3,.25); }
}
.home-foot { text-align: center; color: #9fb3c8; font-size: 11px; margin-top: 18px; font-weight: 600; }

/* ===== 카테고리 선택 ===== */
.page-title { font-size: 22px; font-weight: 900; margin: 4px 0 12px; display: flex; align-items: center; gap: 8px; }
.seg { display: flex; background: var(--card); border-radius: 999px; padding: 4px; box-shadow: var(--shadow); margin-bottom: 14px; }
.seg button {
  flex: 1; border: none; background: transparent; cursor: pointer;
  border-radius: 999px; padding: 10px 6px; font-family: var(--font);
  font-weight: 800; font-size: 13.5px; color: var(--ink-soft);
  transition: background .15s, color .15s;
}
.seg button.on { background: var(--blue); color: #fff; }
.cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.cat-card {
  background: var(--card); border: none; cursor: pointer;
  border-radius: 18px; padding: 12px 6px 10px; box-shadow: var(--shadow);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: transform .1s;
}
.cat-card:active { transform: scale(.94); }
.cat-card .ce { font-size: 30px; }
.cat-card .cn { font-weight: 800; font-size: 13.5px; }
.cat-card .cc { font-size: 11px; color: var(--ink-soft); font-weight: 700; }
.cat-card.all { background: linear-gradient(135deg, #e0f0ff, #d3f8e8); grid-column: 1 / -1; flex-direction: row; justify-content: center; padding: 14px; }
.cat-card.all .ce { font-size: 26px; }
.cat-card.all .cn { font-size: 16px; }

/* ===== 게임 공통 ===== */
.game-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.progress { flex: 1; height: 14px; background: rgba(255,255,255,.7); border-radius: 999px; overflow: hidden; box-shadow: inset 0 2px 4px rgba(45,58,74,.12); }
.progress > i { display: block; height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, #2ec46f, #7be495); transition: width .3s ease; }
.combo-chip { font-weight: 900; font-size: 15px; color: #ff7b00; min-width: 60px; text-align: right; }
.combo-chip.hot { animation: comboPop .3s ease; }
@keyframes comboPop { 50% { transform: scale(1.35); } }

.prompt-card {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 18px 16px; text-align: center; margin-bottom: 14px; position: relative;
}
.prompt-emoji { font-size: clamp(64px, 18vw, 96px); line-height: 1.15; }
.prompt-emoji .colorball { display: inline-block; width: .95em; height: .95em; border-radius: 50%; vertical-align: -0.08em; border: 4px solid rgba(255,255,255,.9); box-shadow: 0 3px 8px rgba(0,0,0,.2); }
.prompt-ko { font-size: 26px; font-weight: 900; margin-top: 4px; }
.prompt-en { font-size: clamp(34px, 9vw, 44px); font-weight: 900; letter-spacing: 1px; color: #1f3550; }
.prompt-hint { font-size: 14px; color: var(--ink-soft); font-weight: 700; margin-top: 6px; }
.speak-btn {
  border: none; cursor: pointer; border-radius: 50%;
  width: 84px; height: 84px; font-size: 40px;
  background: linear-gradient(135deg, #3d8bfd, #6fb1ff); color: #fff;
  box-shadow: 0 6px 0 rgba(23,74,153,.35);
  transition: transform .1s;
}
.speak-btn:active { transform: scale(.92); }
.speak-btn.small { width: 48px; height: 48px; font-size: 22px; position: absolute; right: 10px; top: 10px; box-shadow: 0 4px 0 rgba(23,74,153,.3); }
.speak-btn.nudge { animation: nudge 1.2s ease-in-out infinite; }
@keyframes nudge { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }

.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.choices.list { grid-template-columns: 1fr; }
.choice {
  border: none; cursor: pointer; border-radius: 20px;
  background: var(--card); box-shadow: var(--shadow);
  padding: 14px 10px; min-height: 74px;
  font-family: var(--font); font-weight: 900; color: var(--ink);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  transition: transform .1s, background .15s;
  position: relative; overflow: hidden;
}
.choice:active { transform: scale(.96); }
.choice .en { font-size: 21px; letter-spacing: .5px; }
.choice .en u { text-decoration: underline 3px var(--accent2); }
.choice .em { font-size: 30px; line-height: 1.1; }
.choice .ko { font-size: 15px; }
.choice .em .colorball { display: inline-block; width: .9em; height: .9em; border-radius: 50%; vertical-align: -0.06em; border: 3px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,.18); }
.choice .en-hint { font-size: 13px; color: var(--ink-soft); font-weight: 800; letter-spacing: .5px; }
.choice .en-hint u { text-decoration: underline 3px var(--accent2); font-size: 15px; color: #ff7b00; }
.choice.wrong { animation: shake .4s ease; background: #ffe3e3; opacity: .55; pointer-events: none; }
.choice.right { background: #d9f7e7; animation: rightPop .45s ease; }
@keyframes shake { 0%,100% { transform: translateX(0) } 20% { transform: translateX(-9px) } 40% { transform: translateX(8px) } 60% { transform: translateX(-6px) } 80% { transform: translateX(4px) } }
@keyframes rightPop { 0% { transform: scale(1) } 40% { transform: scale(1.08) } 100% { transform: scale(1) } }

.choice .en .fl { color: var(--blue); }

/* ===== 스펠링 타일 팝업 ===== */
#spell-wrap {
  position: fixed; inset: 0; background: rgba(31,53,80,.55); z-index: 85;
  display: flex; align-items: center; justify-content: center; padding: 16px;
  animation: fadeIn .2s ease;
}
.spell-card {
  background: var(--card); border-radius: 26px; padding: 22px 14px 18px;
  width: 100%; max-width: 420px; text-align: center;
  box-shadow: 0 20px 50px rgba(31,53,80,.35);
  animation: modalIn .25s cubic-bezier(.2,1.4,.4,1) both;
}
.spell-slots { display: flex; gap: 7px; justify-content: center; margin: 16px 0 18px; flex-wrap: wrap; }
.spell-slot {
  width: 46px; height: 54px; border-bottom: 4px solid #c3ced9; border-radius: 6px 6px 0 0;
  background: #f4f8fc; font-size: 32px; font-weight: 900; color: #1f3550;
  display: flex; align-items: center; justify-content: center;
}
.spell-slot.filled { border-bottom-color: var(--good); background: #eafff3; animation: rightPop .35s ease; }
.spell-slot.prefilled { color: #9fb3c8; background: #eef2f6; border-bottom-color: #dfe6ec; }
.spell-slots.compact .spell-slot { width: 34px; height: 44px; font-size: 22px; }
.spell-tiles { display: flex; gap: 9px; justify-content: center; flex-wrap: wrap; }
.spell-tile {
  width: 54px; height: 58px; border: none; cursor: pointer; border-radius: 16px;
  background: var(--card); box-shadow: var(--shadow);
  font-family: var(--font); font-size: 28px; font-weight: 900; color: var(--ink);
  transition: transform .1s;
}
.spell-tile:active { transform: scale(.9); }
.spell-tile.used { opacity: .15; pointer-events: none; }
.spell-tile.wrong { animation: shake .4s ease; background: #ffe3e3; }
.spell-tile.hint { animation: nudge 1s ease-in-out infinite; background: #d9e9ff; color: var(--blue); }

.answer-banner {
  position: fixed; left: 50%; top: 38%; transform: translate(-50%,-50%) scale(.6);
  background: var(--card); border-radius: 26px; box-shadow: 0 16px 40px rgba(31,53,80,.3);
  padding: 20px 34px; text-align: center; z-index: 60; opacity: 0;
  animation: bannerIn .5s ease forwards; pointer-events: none;
}
.answer-banner .be { font-size: 54px; }
.answer-banner .bn { font-size: 26px; font-weight: 900; color: #1f3550; letter-spacing: .5px; }
.answer-banner .bk { font-size: 16px; font-weight: 800; color: var(--ink-soft); }
@keyframes bannerIn { to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }

/* ===== 끝말잇기 ===== */
.chain-last { color: #ff7b00; text-decoration: underline 4px #ffd166; }
.train-track { display: flex; gap: 6px; overflow-x: auto; padding: 10px 2px 6px; scrollbar-width: none; }
.train-track::-webkit-scrollbar { display: none; }
.train-car {
  flex: 0 0 auto; background: var(--card); border-radius: 14px; box-shadow: var(--shadow);
  padding: 7px 11px; font-weight: 800; font-size: 13px; display: flex; align-items: center; gap: 5px;
  animation: carIn .35s ease both;
}
.train-car .te { font-size: 17px; }
@keyframes carIn { from { transform: translateX(24px) scale(.7); opacity: 0; } to { transform: none; opacity: 1; } }

/* ===== 짝맞추기 ===== */
.memory-grid { display: grid; gap: 8px; grid-template-columns: repeat(4, 1fr); flex: 0 0 auto; }
.mcard { perspective: 600px; aspect-ratio: 3 / 3.4; }
.mcard .inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform .35s; }
.mcard.flip .inner { transform: rotateY(180deg); }
.mcard .face {
  position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  box-shadow: 0 4px 0 rgba(45,58,74,.12);
}
.mcard .back { background: linear-gradient(135deg, #6fb1ff, #3d8bfd); color: #fff; font-size: 24px; }
.mcard .front { background: var(--card); transform: rotateY(180deg); padding: 4px; }
.mcard .front.t-en { border: 3px solid #6fb1ff; }
.mcard .front.t-ko { border: 3px solid #58d6a0; }
.mcard .front .fe { font-size: clamp(20px, 6.5vw, 32px); line-height: 1.05; }
.mcard .front .fe .colorball { display: inline-block; width: .9em; height: .9em; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,.18); }
.mcard .front .fw { font-weight: 900; font-size: clamp(11px, 3.4vw, 15px); text-align: center; word-break: break-all; line-height: 1.1; }
.mcard.matched { pointer-events: none; }
.mcard.matched .inner { animation: matchGlow .6s ease; }
.mcard.matched .front { background: #eafff3; }
@keyframes matchGlow { 0% { transform: rotateY(180deg) scale(1) } 50% { transform: rotateY(180deg) scale(1.12) } 100% { transform: rotateY(180deg) scale(1) } }

/* ===== 결과 화면 ===== */
.result-wrap { text-align: center; padding-top: 12px; }
.result-stars { font-size: clamp(48px, 14vw, 64px); letter-spacing: 6px; margin: 8px 0; }
.result-stars .dim { opacity: .22; filter: grayscale(1); }
.star-pop { display: inline-block; animation: starPop .5s cubic-bezier(.2,1.6,.4,1) both; }
@keyframes starPop { from { transform: scale(0) rotate(-40deg); } to { transform: scale(1) rotate(0); } }
.result-title { font-size: 26px; font-weight: 900; }
.result-sub { color: var(--ink-soft); font-weight: 700; margin: 4px 0 14px; }
.coin-earn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--card); border-radius: 999px; padding: 12px 22px;
  font-size: 22px; font-weight: 900; box-shadow: var(--shadow); margin-bottom: 16px;
}
.result-btns { display: flex; flex-direction: column; gap: 10px; max-width: 340px; margin: 0 auto; }

/* ===== 상점 ===== */
.shop-list { display: flex; flex-direction: column; gap: 10px; }
.shop-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
  padding: 12px 14px;
}
.shop-item .se { font-size: 38px; flex: 0 0 auto; }
.shop-item .sn { font-weight: 900; font-size: 17px; }
.shop-item .sd { font-size: 12.5px; color: var(--ink-soft); font-weight: 700; margin-top: 2px; }
.shop-item .own { font-size: 12px; font-weight: 800; color: var(--blue); margin-top: 2px; }
.shop-item .buy { margin-left: auto; flex: 0 0 auto; padding: 10px 14px; font-size: 15px; border-radius: 16px; }
.shop-item.cant .buy { filter: grayscale(.8) opacity(.5); pointer-events: none; }

/* ===== 모험 / 포획 ===== */
.adv-scene {
  position: relative; border-radius: 26px; overflow: hidden;
  min-height: 340px; box-shadow: var(--shadow);
  margin-bottom: 12px;
}
/* 타입별 배틀 배경 (하늘 58% / 땅 42%) */
.bg-meadow   { background: linear-gradient(180deg, #8fd3ff 0%, #c9f0d8 58%, #7ccf8e 58%, #5fbf77 100%); }
.bg-forest   { background: linear-gradient(180deg, #79c9a9 0%, #b4ecc9 58%, #4e9d5f 58%, #3d7f4c 100%); }
.bg-sea      { background: linear-gradient(180deg, #79c9f5 0%, #b8e8ff 58%, #3a8fd9 58%, #2a6fb0 100%); }
.bg-ice      { background: linear-gradient(180deg, #a8ddf5 0%, #eef9ff 58%, #9fd3ee 58%, #7db8dd 100%); }
.bg-fire     { background: linear-gradient(180deg, #55282d 0%, #b85a2e 58%, #7a2f1d 58%, #571f12 100%); }
.bg-electric { background: linear-gradient(180deg, #454568 0%, #8a86b8 58%, #c9b64a 58%, #a3923a 100%); }
.bg-psychic  { background: linear-gradient(180deg, #6a4a9e 0%, #c9a0f0 58%, #7a5ab8 58%, #5a3f96 100%); }
.bg-night    { background: linear-gradient(180deg, #23244d 0%, #55558f 58%, #3a3a6a 58%, #28285a 100%); }
.bg-rock     { background: linear-gradient(180deg, #b9c4d0 0%, #e8ddc4 58%, #a08668 58%, #82684e 100%); }
.bg-swamp    { background: linear-gradient(180deg, #5f6d8a 0%, #93a86f 58%, #4a5e3d 58%, #384a2f 100%); }
.bg-dragon   { background: linear-gradient(180deg, #26365e 0%, #4a5e9e 58%, #32406e 58%, #232d50 100%); }

.battle-platform { position: absolute; border-radius: 50%; background: rgba(0,0,0,.16); }
.platform-enemy { right: 5%; top: 47%; width: 40%; height: 34px; }
.platform-ally { left: 3%; bottom: 58px; width: 44%; height: 38px; }

.grass-patch { position: absolute; right: 17%; top: 34%; font-size: 46px; z-index: 2; transform-origin: 50% 90%; animation: grassShake .35s ease-in-out infinite; }
@keyframes grassShake { 0%,100% { transform: rotate(-7deg) scale(1); } 50% { transform: rotate(9deg) scale(1.1); } }

.adv-enemy { position: absolute; right: 6%; top: 13%; width: 40%; text-align: center; z-index: 2; animation: idleBob 2.2s ease-in-out infinite; }
@keyframes idleBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
.adv-enemy img {
  height: clamp(96px, 27vw, 148px); width: auto; max-width: 100%; object-fit: contain;
  image-rendering: pixelated;
  filter: drop-shadow(0 8px 8px rgba(0,0,0,.3));
  animation: monIn .45s cubic-bezier(.2,1.4,.4,1) both;
}
.adv-enemy img.art { image-rendering: auto; }
@keyframes monIn { from { transform: scale(0) translateY(24px); opacity: 0 } to { transform: none; opacity: 1 } }
.adv-enemy .fallback {
  width: clamp(90px, 24vw, 120px); height: clamp(90px, 24vw, 120px); border-radius: 50%;
  background: radial-gradient(circle at 50% 35%, #ff6b6b 49%, #fff 51%);
  display: flex; align-items: center; justify-content: center; font-size: 44px; margin: 0 auto;
  box-shadow: 0 8px 16px rgba(0,0,0,.2);
}
.sucked { animation: suckIn .35s ease-in forwards !important; }
@keyframes suckIn { to { transform: scale(0) translateY(-16px); filter: brightness(4); opacity: .15; } }
.reappear { animation: monIn .35s ease-out both !important; }
.fleeing { animation: fleeRun .6s ease-in forwards !important; }
@keyframes fleeRun { to { transform: translateX(150px); opacity: 0; } }

.adv-ally { position: absolute; left: 7%; bottom: 62px; z-index: 2; text-align: center; }
.adv-ally img {
  height: clamp(78px, 21vw, 116px); width: auto; image-rendering: pixelated;
  filter: drop-shadow(0 6px 6px rgba(0,0,0,.3));
  animation: allyIn .4s ease-out both;

const SPRITE_BASE = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon";
const ITEM_BASE = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/";
function spriteUrl(id) { return SPRITE_BASE + "/other/official-artwork/" + id + ".png"; }

// 몬스터볼 아이콘: 게임 아이템 스프라이트, 로드 실패 시 이모지 폴백
function ballIcon(key, size) {
  const b = CONFIG.balls[key];
  return '<span class="ball-icon">' +
    '<img src="' + ITEM_BASE + b.img + '.png" style="width:' + size + "px;height:" + size + 'px" alt="' + b.name + '" ' +
    "onerror=\"this.style.display='none';this.nextElementSibling.style.display='inline'\">" +
    '<span style="display:none;font-size:' + Math.round(size * 0.78) + 'px">' + b.emoji + "</span></span>";
}
function gifUrl(id) { return SPRITE_BASE + "/versions/generation-v/black-white/animated/" + id + ".gif"; }
function gifBackUrl(id) { return SPRITE_BASE + "/versions/generation-v/black-white/animated/back/" + id + ".gif"; }
function backPngUrl(id) { return SPRITE_BASE + "/back/" + id + ".png"; }

// 배틀 스프라이트 폴백 체인: 움직이는 GIF → 공식 일러스트 → 몬스터볼 카드
function advImgFail(img) {
  if (!img.dataset.step) {
    img.dataset.step = "art";
    img.classList.add("art");
    img.src = spriteUrl(img.dataset.mid);
    return;
  }
  Adventure.imgOk = false;
  const holder = img.parentElement;
  img.remove();
  if (holder && !holder.querySelector(".fallback")) {
    holder.insertAdjacentHTML("afterbegin", '<div class="fallback">❔</div>');
  }
}
// 파트너(뒷모습): 움직이는 GIF → 도트 뒷모습 → 공식 일러스트 → 숨김
function allyImgFail(img) {
  const step = img.dataset.step || "gif";
  if (step === "gif") { img.dataset.step = "png"; img.src = backPngUrl(img.dataset.mid); return; }
  if (step === "png") { img.dataset.step = "art"; img.classList.add("art"); img.src = spriteUrl(img.dataset.mid); return; }
  img.remove();
}

  62:["물·격투","메가톤펀치","수영을 아주 잘하는 힘센 개구리. 바다도 쉬지 않고 헤엄쳐 건너요!"],
  63:["에스퍼","순간이동","하루 18시간을 자요. 자면서도 순간이동으로 위험을 피해요!"],
  64:["에스퍼","염동력","숟가락을 들고 다녀요. 곁에 있으면 시계가 이상하게 움직인다는 소문이!"],
  65:["에스퍼","사이코키네시스","IQ 5000의 천재! 모든 걸 기억하고, 두 개의 숟가락으로 신기한 힘을 써요."],
  66:["격투","바위부수기","몸이 근육으로 울퉁불퉁. 매일 무거운 바위를 들며 운동해요!"],
  67:["격투","메가톤펀치","허리띠로 힘을 조절해요. 트럭도 한 손으로 들 수 있대요!"],
  68:["격투","크로스촙","팔이 네 개! 2초에 펀치를 천 번 날릴 수 있는 힘의 챔피언이에요."],
  69:["풀·독","덩굴채찍","덩굴을 휙휙 휘둘러요. 달콤한 냄새로 벌레를 불러 모아요."],
  70:["풀·독","덩굴채찍","입에서 녹이는 액체를 뿜어요. 나무에 매달려 자는 걸 좋아해요."],
  71:["풀·독","잎날가르기","커다란 입으로 뭐든 꿀꺽! 달콤한 향기로 먹이를 유인해요."],
  72:["물·독","독침","몸이 거의 물로 되어 있어요. 바다에 둥둥 떠다니며 헤엄쳐요."],
  73:["물·독","독침","80개의 다리로 먹이를 잡아요. 빨간 구슬이 번쩍이면 조심하세요!"],
  74:["바위·땅","몸통박치기","산길의 돌멩이인 척해요. 밟으면 화를 내니 조심조심!"],
  75:["바위·땅","구르기","산길을 데굴데굴 굴러 내려와요. 구르는 게 제일 빠른 이동 방법이래요."],
  76:["바위·땅","지진","바위처럼 단단한 몸! 산에서 데굴데굴 굴러도 하나도 안 아파요."],
  77:["불꽃","불꽃세례","태어나서 한 시간이면 달릴 수 있어요. 갈기가 활활 타올라도 뜨겁지 않대요."],
  78:["불꽃","스피드스타","시속 240km로 달리는 불꽃 말! 달릴 때 갈기가 별똥별처럼 빛나요."],
  79:["물·에스퍼","하품","느긋~하고 멍~해요. 꼬리로 낚시하다가 아픈 것도 5초 뒤에 알아차려요."],
  80:["물·에스퍼","물대포","꼬리에 셀러가 붙었어요! 둘이 한 몸처럼 살아요. 여전히 느긋해요~"],
  81:["전기·강철","전기쇼크","자석의 힘으로 둥둥 떠다녀요. 전기를 먹는 걸 좋아해서 전봇대에 붙어 있어요."],
  82:["전기·강철","번개","코일 셋이 합체! 신기한 전파를 내보내요. 지지직!"],
  83:["노말·비행","베어가르기","언제나 파를 들고 다녀요. 파는 무기이자 소중한 보물! 절대 안 뺏겨요."],
  84:["노말·비행","쪼기","머리가 두 개라 생각도 두 배! 둘이 사이좋게 번갈아 망을 봐요."],
  85:["노말·비행","트라이어택","머리가 세 개가 됐어요! 기쁨, 슬픔, 화남을 담당한대요."],
  86:["물","박치기","차가운 바다를 좋아하는 물개. 얼음 위에서 미끄럼 타는 걸 좋아해요!"],
  87:["물·얼음","오로라빔","낮에는 바닷속에서 자고 밤에 사냥해요. 하얀 몸이 눈처럼 예뻐요."],
  88:["독","오물공격","질퍽질퍽 더러운 곳을 좋아해요. 지나간 자리는 풀이 안 자라요, 이런!"],
  89:["독","오물폭탄","온몸이 진흙처럼 흐물흐물. 냄새가 지독하지만 미워할 수 없어요."],
  90:["물","껍질에숨기","혀를 내밀고 있는 조개. 껍질은 다이아몬드보다 단단하대요!"],
  91:["물·얼음","고드름침","밤송이 같은 껍질로 무장! 위험하면 껍질을 꽉 닫고 꼼짝 안 해요."],
  92:["고스트·독","핥기","몸의 95%가 가스! 스르륵 벽을 통과해요. 밤에 나타나 사람을 놀래켜요."],
  93:["고스트·독","밤그림자","어둠 속에서 히죽 웃어요. 핥으면 몸이 부들부들 떨린대요!"],
  94:["고스트·독","섀도볼","그림자에 숨는 장난꾸러기 유령. 사실 외로움을 많이 타서 친구를 원한대요."],
  95:["바위·땅","조이기","바위 뱀! 몸 길이가 8m가 넘어요. 땅속을 시속 80km로 파고들어요."],
  96:["에스퍼","최면술","꿈을 먹고 살아요. 코로 킁킁~ 재밌는 꿈 냄새를 찾아다녀요."],
  97:["에스퍼","최면술","시계추를 흔들흔들~ 보고 있으면 스르르 잠이 와요. 꿈을 먹어요."],
  98:["물","게거품","집게로 싹둑싹둑! 모래사장에 구멍을 파고 살아요. 집게 힘이 대단해요."],
  99:["물","가위자르기","커다란 집게는 힘이 1만 마력! 그런데 무거워서 금방 피곤해한대요."],
  100:["전기","전기쇼크","몬스터볼이랑 똑같이 생겼죠? 깜짝 놀라면 지지직 전기를 뿜어요!"],
  101:["전기","스파크","전기를 너무 많이 먹으면 펑! 하고 터져요. 그래도 금방 헤헤 웃는 장난꾸러기."],
  102:["풀·에스퍼","몸통박치기","여섯 개의 알이 텔레파시로 대화해요. 항상 여섯이 함께 다녀요!"],
  103:["풀·에스퍼","달걀폭탄","야자수 포켓몬! 머리 세 개가 각자 생각해요. 기분 좋은 날엔 노래를 불러요."],
  104:["땅","뼈다귀부메랑","언제나 뼈 투구를 쓰고 있어요. 뼈다귀를 부메랑처럼 던져요!"],
  105:["땅","뼈다귀부메랑","뼈다귀 다루기의 달인! 단단해진 마음으로 씩씩하게 싸워요."],
  106:["격투","메가톤킥","발차기의 달인! 다리가 용수철처럼 늘어나요. 매일 킥 연습을 해요."],
  107:["격투","메가톤펀치","펀치의 달인! 주먹이 안 보일 만큼 빨라요. 슉슉!"],
  108:["노말","핥기","혀 길이가 2m! 혀로 뭐든 핥아서 확인해요. 끈적끈적~"],
  109:["독","독가스","몸속 가스가 빵빵. 더운 날엔 가스가 늘어나 뚱뚱해져요."],
  110:["독","독가스","쌍둥이 가스 포켓몬. 서로 가스를 주고받으며 둥둥 떠다녀요."],
  111:["땅·바위","뿔찌르기","단단한 바위 피부! 달리기 시작하면 방향을 잘 못 바꿔요. 우당탕!"],
  112:["땅·바위","뿔드릴","드릴 뿔로 바위도 뚫어요! 갑옷 같은 피부는 대포도 튕겨낸대요."],
  113:["노말","알낳기","매일 영양 만점 알을 낳아요. 알을 나눠주는 마음씨 착한 포켓몬!"],
  114:["풀","덩굴채찍","온몸이 덩굴로 덮여 있어요. 덩굴 속 진짜 모습은 아무도 못 봤대요!"],
  115:["노말","메가톤펀치","주머니에 아기를 키워요. 아기를 건드리면 엄청 화내요! 엄마는 강해요."],
  116:["물","거품","소용돌이 속에서 놀아요. 위험하면 먹물을 찍 뿜고 도망가요."],
  117:["물","물대포","가시가 뾰족뾰족! 바닷속 동굴에 살아요. 물을 쏘는 명사수예요."],
  118:["물","뿔찌르기","금붕어의 왕! 뿔로 바위를 콕콕 뚫어요. 가을이 되면 색이 더 예뻐져요."],
  119:["물","뿔찌르기","물살을 거슬러 폭포를 오르는 힘센 수영왕이에요!"],
  120:["물","스피드스타","밤이 되면 가운데 보석이 반짝반짝 빛나요. 별을 향해 빛을 보낸대요."],
  121:["물·에스퍼","스피드스타","보석이 일곱 색으로 빛나요. 밤바다에서 별과 이야기한대요."],
  122:["에스퍼·페어리","배리어","손짓으로 보이지 않는 벽을 만들어요. 판토마임의 달인!"],
  123:["벌레·비행","베어가르기","양팔이 낫처럼 날카로워요! 풀숲을 슉슉 가르며 바람처럼 움직여요."],
  124:["얼음·에스퍼","냉동빔","리듬에 맞춰 춤추듯 걸어요. 사람 말 비슷한 소리로 노래해요."],
  125:["전기","번개펀치","폭풍이 오면 신나요! 번개를 먹으러 높은 곳에 올라가요. 찌릿찌릿!"],
  126:["불꽃","불꽃펀치","몸이 불덩어리! 화산 근처에 살아요. 너무 뜨거워서 가까이 가면 안 돼요."],
  127:["벌레","바이스그립","커다란 뿔 집게로 꽉! 잡으면 절대 안 놓아요. 힘자랑 대장!"],
  128:["노말","돌진","꼬리 세 개를 채찍처럼 휘두르며 돌진! 달리기 시작하면 멈추지 못해요."],
  129:["물","튀어오르기","펄떡펄떡 뛰는 것밖에 못 해요. 하지만 포기하지 않으면... 대변신이 기다려요!"],
  130:["물·비행","파괴광선","잉어킹이 진화한 무시무시한 용! 화나면 무섭지만 트레이너에겐 든든해요."],
  131:["물·얼음","냉동빔","사람을 등에 태우고 바다를 건너요. 마음씨 곱고 노래를 잘해요~"],
  132:["노말","변신","뭐든지 똑같이 변신! 흐물흐물~ 가끔 변신에 실패하면 얼굴이 좀 이상해져요."],
  133:["노말","전광석화","여러 모습으로 진화할 수 있는 신기한 포켓몬! 어떤 모습이 될지 두근두근."],
  134:["물","물대포","물처럼 몸이 투명해질 수 있어요. 물가에서 조용히 사는 인어 같은 포켓몬."],
  135:["전기","번개","털이 바늘처럼 곤두서요! 기분이 예민하지만 트레이너에겐 다정해요."],
  136:["불꽃","화염방사","몸속 불꽃 주머니의 온도는 1,700도! 복슬복슬 털이 열을 지켜줘요."],
  137:["노말","트라이어택","컴퓨터 속에서 태어난 최초의 인공 포켓몬! 전자공간을 헤엄쳐 다녀요."],
  138:["바위·물","물대포","아주 먼 옛날의 화석에서 되살아났어요. 10개의 다리로 헤엄쳐요."],
  139:["바위·물","물대포","고대 바다의 사냥꾼. 커다란 껍질 속에 몸을 숨겨요."],
  140:["바위·물","할퀴기","3억 년 전의 화석 포켓몬! 단단한 등딱지로 몸을 지켜요."],
  141:["바위·물","베어가르기","옛날 바다의 검객! 양팔의 낫으로 헤엄치며 사냥했대요."],
  142:["바위·비행","원시의힘","화석에서 부활한 하늘의 왕! 톱니 같은 이빨로 크게 울부짖어요."],
  143:["노말","누르기 · 잠자기","먹고 자는 게 일! 하루에 400kg을 먹고 쿨쿨~ 배 위에서 아이들이 놀아도 계속 자요."],
  144:["얼음·비행","눈보라","전설의 얼음새! 날개를 펄럭이면 눈이 내려요. 얼음산 깊은 곳에 산대요."],
  145:["전기·비행","번개","전설의 번개새! 천둥구름 속에 살아요. 날개짓마다 번개가 우르릉 쾅쾅!"],
  146:["불꽃·비행","불대문자","전설의 불꽃새! 날개가 활활 타올라요. 다친 몸도 용암에 담그면 나아요."],
  147:["드래곤","몸통박치기","허물을 벗으며 자라는 아기 용. 폭포 아래에 숨어 산대요."],
  148:["드래곤","용의분노","신비한 기운을 두른 용. 몸에서 신기한 빛이 나요."],
  149:["드래곤·비행","파괴광선","바다의 화신이라 불려요. 무서워 보여도 마음씨 착해서 조난된 사람을 구해줘요!"],
  150:["에스퍼","사이코키네시스","인간이 만든 가장 강한 포켓몬. 차가워 보이지만 마음속엔 외로움이 있대요."],
  151:["에스퍼","변신","모든 포켓몬의 조상이라 불리는 환상의 포켓몬! 장난치며 노는 걸 좋아해요."],
  152:["풀","잎날가르기","머리의 잎사귀에서 달콤한 향기가 나요. 햇볕 쬐는 걸 좋아하는 순둥이!"],
  153:["풀","잎날가르기","목의 새싹 목걸이에서 기운 나는 향기가 폴폴~ 맡으면 힘이 솟아요."],
  154:["풀","솔라빔","꽃 향기가 싸울 마음을 가라앉혀요. 메가니움 곁에 있으면 마음이 편안해져요~"],
  155:["불꽃","불꽃세례","등에서 불꽃이 뿜어져 나와요! 깜짝 놀라면 등이 활활 타올라요."],
  156:["불꽃","불꽃세례","공격하기 전에 등의 불길이 거세져요. 뜨거운 바람으로 상대를 밀어내요."],
  157:["불꽃","화염방사","머리 뒤 불꽃이 폭발처럼 타올라요! 닿으면 뭐든 태울 만큼 뜨거워요."],
  158:["물","물대포","큰 입으로 덥석! 장난으로 무는 버릇이 있는데 이빨이 아파요, 아야!"],
  159:["물","물기","이빨이 48개! 물었다 하면 절대 안 놓아요. 그래도 표정은 귀여워요."],
  160:["물","하이드로펌프","커다란 입은 뭐든 물어 부숴요! 물속의 왕, 하지만 트레이너 말은 잘 들어요."],
  161:["노말","몸통박치기","꼬리로 서서 멀리 망을 봐요. 위험하면 찍찍! 소리로 친구들에게 알려요."],

  170:["물·전기","스파크","더듬이 불빛으로 깊은 바다를 밝혀요. 반짝반짝, 바다의 등대!"],

  175:["페어리","손가락흔들기","껍질 속에 행복이 가득! 마음씨 착한 사람에게 행복을 나눠준대요."],

  184:["물·페어리","물대포","기다란 귀는 물속 소리도 다 들려요. 강가에서 노는 걸 좋아해요."],
  185:["바위","흉내내기","나무인 척하는 바위! 비를 싫어해서 비가 오면 도망가요. 들켰다!"],
  186:["물","물대포","볼록한 목으로 개굴개굴~ 노래하면 발챙이들이 모여들어요. 개구리 대장!"],
  187:["풀·비행","몸통박치기","바람에 둥실둥실 날아다녀요. 바람이 세게 불면 꼭 붙잡아 주세요!"],

  193:["벌레·비행","소닉붐","잠자리 포켓몬. 제자리에서 붕~ 떠서 사방을 살펴요. 눈이 아주 좋아요."],

  197:["악","물기","달빛을 받으면 고리 무늬가 빛나요. 밤의 수호자, 멋쟁이 검은 고양이!"],

  223:["물","물대포","물총 명사수! 움직이는 먹이도 백발백중으로 맞혀요. 슝!"],

  228:["악·불꽃","물기","울음소리가 아주 으스스해요. 무리 지어 살며 가족을 아껴요."],

  233:["노말","트라이어택","폴리곤이 업그레이드! 더 똑똑해졌지만 가끔 이상한 행동을 해요. 삐빅?"],

  237:["격투","트리플킥","머리로 서서 빙글빙글 돌며 발차기! 춤추는 것 같은 격투왕."],

  239:["전기","전기쇼크","팔을 빙글빙글 돌려 전기를 만들어요. 천둥번개 치는 날 신나서 뛰어놀아요!"],

  241:["노말","구르기","매일 맛있는 우유를 만들어요. 밀탱크 우유를 마시면 기운이 쑥쑥!"],
  242:["노말","알낳기","먹으면 행복해지는 알을 낳아요. 다친 포켓몬을 돌보는 천사 간호사!"],
  243:["전기","번개","번개를 두른 전설의 호랑이! 울음소리와 함께 천둥이 쾅! 바람처럼 달려요."],
  244:["불꽃","화염방사","화산의 마음을 가진 전설의 사자! 엔테이가 짖으면 화산이 눈을 뜬대요."],

  246:["바위·땅","물기","땅속에서 흙을 먹으며 자라요. 산 하나를 다 먹으면 진화한대요!"],

  249:["에스퍼·비행","에어로블라스트","바다 밑에서 잠자는 전설의 수호신. 날개짓 한 번에 폭풍이 분대요!"],

  251:["에스퍼·풀","미래예지","시간을 넘나드는 숲의 수호신! 세레비가 나타난 숲은 나무들이 반짝반짝 건강해져요."],

/* ================================================================
   [S6] Storage — localStorage 영속 저장 (실패 시 메모리 폴백)
================================================================ */
const Storage = {
  KEY: "engmon_save_v1",
  memoryOnly: false,
  warned: false,

  defaults() {
    return {
      version: 1,
      coins: 0,
      balls: Object.assign({ poke: 0, super: 0, hyper: 0, master: 0 }, CONFIG.welcomeBalls),
      pokedex: {},   // { "25": { count: 1, first: timestamp } }
      stats: { totalAnswered: 0, totalCorrect: 0, gamesPlayed: { quiz: 0, chain: 0, memory: 0 }, bestCombo: 0, caught: 0 },
      settings: { sfx: true, tts: true },
      partner: null,   // 모험에 데려가는 파트너 포켓몬 id
      partnerHp: {},   // { id: { hp: 0~100, t: 마지막 기술 사용 시각 } } — 24시간 후 전체 회복
      wordStats: {},   // { wordId: { w: 틀린횟수, c: 맞힌횟수 } } — 복습 출제용
      welcomed: false,
    };
  },

  load() {
    let raw = null;
    try { raw = localStorage.getItem(this.KEY); }
    catch (e) { this.memoryOnly = true; }
    if (!raw) return this.defaults();
    try {
      const data = JSON.parse(raw);
      // 필드 누락 대비: 기본값 위에 덮어쓰기
      const d = this.defaults();
      return Object.assign(d, data, {
        balls: Object.assign(d.balls, data.balls || {}),
        stats: Object.assign(d.stats, data.stats || {}),
        settings: Object.assign(d.settings, data.settings || {}),
        pokedex: data.pokedex || {},
        wordStats: data.wordStats || {},
        partnerHp: data.partnerHp || {},
      });
    } catch (e) {
      try { localStorage.setItem(this.KEY + "_backup", raw); } catch (e2) {}
      return this.defaults();
    }
  },

  save(data) {
    if (this.memoryOnly) return;
    try { localStorage.setItem(this.KEY, JSON.stringify(data)); }
    catch (e) {
      this.memoryOnly = true;
      if (!this.warned) { this.warned = true; toast("저장이 안 되는 환경이에요. 이번 판 기록은 창을 닫으면 사라져요 🥲"); }
    }
  },
};

/* ================================================================
   [S7] SFX (Web Audio 합성음) + TTS (speechSynthesis)
================================================================ */
const SFX = {
  ctx: null,
  ensure() {
    if (!SAVE.settings.sfx) return false;
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;
      try { this.ctx = new AC(); } catch (e) { return false; }
    }
    if (this.ctx.state === "suspended") this.ctx.resume();
    return true;
  },
  tone(freq, dur = 0.12, type = "sine", delay = 0, peak = 0.22) {
    if (!this.ensure()) return;
    const t0 = this.ctx.currentTime + delay;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(this.ctx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
  },
  tap()     { this.tone(600, 0.06, "triangle", 0, 0.12); },
  flip()    { this.tone(700, 0.05, "triangle", 0, 0.15); },
  correct() { this.tone(523, 0.12, "sine", 0); this.tone(659, 0.12, "sine", 0.09); this.tone(784, 0.2, "sine", 0.18); },
  combo()   { this.correct(); this.tone(1568, 0.18, "sine", 0.28, 0.15); },
  wrong()   { this.tone(160, 0.18, "sawtooth", 0, 0.12); },
  coin()    { this.tone(988, 0.08, "square", 0, 0.1); this.tone(1319, 0.16, "square", 0.07, 0.1); },
  buy()     { this.tone(660, 0.1, "triangle", 0); this.tone(880, 0.18, "triangle", 0.1); },
  throwBall(){ this.tone(300, 0.25, "sine", 0, 0.15); this.tone(500, 0.15, "sine", 0.2, 0.12); },
  attack()  { this.tone(480, 0.09, "sawtooth", 0, 0.14); this.tone(720, 0.12, "sawtooth", 0.07, 0.14); },
  hit()     { this.tone(150, 0.18, "square", 0, 0.22); this.tone(90, 0.24, "sine", 0.05, 0.2); },
  shake()   { this.tone(120, 0.15, "sine", 0, 0.25); },
  click()   { this.tone(1100, 0.06, "square", 0, 0.12); },
  catchOk() { [523,659,784,1047].forEach((f,i)=>this.tone(f, 0.16, "sine", i*0.1)); },
  fanfare(r){
    const base = [523,659,784,1047];
    base.forEach((f,i)=>this.tone(f, 0.18, "triangle", i*0.11));
    if (r === "unique" || r === "legendary") [784,988,1319].forEach((f,i)=>this.tone(f, 0.22, "triangle", 0.5+i*0.12));
    if (r === "legendary") [1047,1319,1568,2093].forEach((f,i)=>this.tone(f, 0.3, "sine", 0.9+i*0.13, 0.18));
  },
  escape()  { this.tone(400, 0.15, "sawtooth", 0, 0.1); this.tone(250, 0.25, "sawtooth", 0.12, 0.1); },
  star(i)   { this.tone(880 + i*220, 0.2, "sine", 0, 0.18); },

  // ---- 배틀 BGM: 칩튠 루프 (32스텝, 외부 파일 없음) ----
  bgmTimer: null, bgmStep: 0, bgmNext: 0,
  BGM_MEL: [659,0,784,988, 1319,988,1175,988, 880,784,880,988, 784,0,659,0,
            659,0,784,988, 1319,988,1175,1319, 1047,988,880,784, 659,587,659,0],
  BGM_BASS:[165,0,165,0, 196,0,196,0, 147,0,147,0, 131,0,196,0,
            165,0,165,0, 196,0,196,0, 175,0,175,0, 131,0,147,0],
  BGM_STEP_DUR: 0.19,
  bgmStart() {
    if (!this.ensure()) return;
    this.bgmStop();
    this.bgmStep = 0;
    this.bgmNext = this.ctx.currentTime + 0.08;
    this.bgmTimer = setInterval(() => {
      if (!this.ctx || !SAVE.settings.sfx) { this.bgmStop(); return; }
      while (this.bgmNext < this.ctx.currentTime + 0.3) {
        const i = this.bgmStep % 32;
        const delay = this.bgmNext - this.ctx.currentTime;
        if (this.BGM_MEL[i]) this.tone(this.BGM_MEL[i], 0.17, "triangle", delay, 0.055);
        if (this.BGM_BASS[i]) this.tone(this.BGM_BASS[i], 0.16, "square", delay, 0.035);
        this.bgmNext += this.BGM_STEP_DUR;
        this.bgmStep++;
      }
    }, 90);
  },
  bgmStop() { if (this.bgmTimer) { clearInterval(this.bgmTimer); this.bgmTimer = null; } },
};

const TTS = {
  ok: "speechSynthesis" in window,
  voice: null,
  pickVoice() {
    if (!this.ok) return;
    const vs = speechSynthesis.getVoices();
    if (!vs.length) return;
    this.voice =
      vs.find(v => v.lang === "en-US" && /Google|Microsoft/i.test(v.name)) ||
      vs.find(v => v.lang === "en-US") ||
      vs.find(v => v.lang && v.lang.startsWith("en")) || null;
    if (!this.voice) this.ok = false;
  },
  speak(text, rate = 0.85) {
    if (!this.ok || !SAVE.settings.tts) return false;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      if (this.voice) u.voice = this.voice;
      u.rate = rate; u.pitch = 1.05;
      speechSynthesis.speak(u);
      return true;
    } catch (e) { return false; }
  },
  stop() { if (this.ok) try { speechSynthesis.cancel(); } catch (e) {} },
};
if (TTS.ok) {
  TTS.pickVoice();
  speechSynthesis.onvoiceschanged = () => TTS.pickVoice();
}

// 포켓몬 공식 울음소리 (PokeAPI cries, ogg) — 최신판 실패 시 게임보이 원본(legacy) 폴백
function cryUrl(id, legacy) {
  return "https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/" + (legacy ? "legacy" : "latest") + "/" + id + ".ogg";
}
const Cry = {
  audio: null,
  play(id) {
    if (!SAVE.settings.sfx) return;
    this.stop();
    try {
      const a = new Audio(cryUrl(id));
      a.volume = 0.4;
      a.onerror = () => {
        try {
          const b = new Audio(cryUrl(id, true));
          b.volume = 0.4;
          b.play().catch(() => {});
          this.audio = b;
        } catch (e) {}
      };
      a.play().catch(() => {});
      this.audio = a;
    } catch (e) {}
  },
  stop() {
    if (this.audio) { try { this.audio.pause(); } catch (e) {} this.audio = null; }
  },
};

================================================================ */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const pickN = (arr, n) => shuffle(arr).slice(0, n);
const esc = s => String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));

// 한글 조사 자동 선택: josa("피카츄","이가") → "피카츄가", josa("리자몽","을를") → "리자몽을"
function josa(word, pair) {
  const code = word.charCodeAt(word.length - 1);
  const hasBatchim = code >= 0xAC00 && code <= 0xD7A3 && (code - 0xAC00) % 28 > 0;
  const map = { "이가": ["이", "가"], "을를": ["을", "를"], "은는": ["은", "는"] };
  const [a, b] = map[pair] || ["", ""];
  return word + (hasBatchim ? a : b);
}

// 대화창 타이핑 효과
let _typeInt = null;
function typeText(el, text, speed = 26) {
  if (!el) return;
  if (_typeInt) { clearInterval(_typeInt); _typeInt = null; }
  el.textContent = "";
  let i = 0;
  _typeInt = setInterval(() => {
    el.textContent += text[i++];
    if (i >= text.length) { clearInterval(_typeInt); _typeInt = null; }
  }, speed);
  screenTimers.push(_typeInt); // clearTimeout은 interval id에도 동작
}

// ---- 파트너 HP: 기술 1회당 -10%, 마지막 사용 후 24시간 지나면 전체 회복 ----
function partnerHp(id) {
  const e = SAVE.partnerHp[id];
  if (!e) return 100;
  if (Date.now() - e.t >= CONFIG.partnerHealMs) {
    delete SAVE.partnerHp[id];
    saveNow();
    return 100;
  }
  return e.hp;
}
function drainPartner(id) {
  const hp = Math.max(0, partnerHp(id) - CONFIG.partnerDrain);
  SAVE.partnerHp[id] = { hp, t: Date.now() };
  saveNow();
  return hp;
}

// ---- 단어별 오답 기록 → 복습 출제 ----
function noteWordResult(wordId, correct) {
  const s = SAVE.wordStats[wordId] || (SAVE.wordStats[wordId] = { w: 0, c: 0 });
  if (correct) s.c++; else s.w++;
  saveNow();
}
// 아직 흔들리는 단어: 틀린 횟수×2 > 맞힌 횟수
function isWeakWord(wordId) {
  const s = SAVE.wordStats[wordId];
  return !!s && s.w * 2 > s.c;
}
function reviewPool() {
  const score = w => { const s = SAVE.wordStats[w.id]; return s.w * 2 - s.c; };
  return WORDS.filter(w => isWeakWord(w.id)).sort((a, b) => score(b) - score(a));
}

function addCoins(n, x, y) {
  SAVE.coins += n;
  Session.coinsEarned += n;

  const chip = $("#coin-chip");

  if (x !== undefined) fxFloat("+" + n + " 🪙", x, y);
}

  Session.correctFirst++;
  Session.combo++;

  SAVE.stats.totalCorrect++;
  SAVE.stats.bestCombo = Math.max(SAVE.stats.bestCombo, Session.combo);
  addCoins(CONFIG.coinPerCorrect, x, y);
  if (Session.combo > 0 && Session.combo % CONFIG.comboEvery === 0) {
    addCoins(CONFIG.comboBonus);
    SFX.combo();
    toast("🔥 " + Session.combo + "콤보! 보너스 코인 +" + CONFIG.comboBonus, 1800);
  } else {
    SFX.correct();

    cc.classList.remove("hot"); void cc.offsetWidth; cc.classList.add("hot");

      '<button class="cat-card all" data-act="start-mode" data-cat="all"><span class="ce">🌟</span><span class="cn">전체 (모든 단어 ' + WORDS.length + '개)</span></button>' +
      cats +
    "</div>";

  el.dataset.mode = mode;
  const seg = $("#seg-opt");
  seg.addEventListener("click", (e) => {
    const b = e.target.closest("button");
    if (!b) return;
    if (isQuiz && b.dataset.v === "enko" && !listenOk) { toast("이 기기에서는 소리 내기가 안 돼요 🥲"); return; }
    seg.querySelectorAll("button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    SFX.tap();
  });
};

/* ================================================================
   [S11.5] 스펠링 타일 — 6자 이하 단어를 맞추면 글자 타일로 철자 완성
================================================================ */
const Spelling = {
  target: "", fullWord: "", idx: 0, wrongStreak: 0, onDone: null,

  eligible(w) { return /^[a-z]{2,}$/.test(w.en); }, // 알파벳으로만 된 단어 (공백·하이픈 제외)

  show(w, onDone) {
    // 6글자 초과 단어는 뒤를 미리 채우고 앞 6글자만 입력 (예: helico□□□□ → helico + pter 표시)
    this.fullWord = w.en;
    const fillCount = Math.min(w.en.length, 6);
    this.target = w.en.slice(0, fillCount);
    this.idx = 0;
    this.wrongStreak = 0;
    this.onDone = onDone;
    const letters = this.target.split("");
    const rest = w.en.slice(fillCount);
    const nDecoys = letters.length <= 4 ? 1 : 2; // 함정 글자 1~2개
    const decoys = [];
    while (decoys.length < nDecoys) {
      decoys.push("abcdefghijklmnopqrstuvwxyz"[Math.floor(Math.random() * 26)]);
    }
    const tiles = shuffle(letters.concat(decoys));
    const wrap = document.createElement("div");
    wrap.id = "spell-wrap";
    wrap.innerHTML =
      '<div class="spell-card">' +
        '<div class="prompt-emoji" style="font-size:46px">' + emojiHtml(w) + "</div>" +
        '<div class="prompt-ko" style="font-size:20px">' + esc(w.ko) + "</div>" +
        '<div class="prompt-hint">글자를 순서대로 눌러서 영어 단어를 완성해요!</div>' +
        '<div class="spell-slots' + (w.en.length > 8 ? " compact" : "") + '">' +
          letters.map(() => '<div class="spell-slot"></div>').join("") +
          rest.split("").map(c => '<div class="spell-slot prefilled">' + c + "</div>").join("") +
        "</div>" +
        '<div class="spell-tiles">' + tiles.map(c => '<button class="spell-tile" data-l="' + c + '">' + c + "</button>").join("") + "</div>" +
      "</div>";
    document.body.appendChild(wrap);
    TTS.speak(w.en);
    wrap.addEventListener("click", e => {
      const t = e.target.closest(".spell-tile");
      if (t) this.tap(t);
    });
  },

  tap(tile) {
    const need = this.target[this.idx];
    if (tile.dataset.l === need) {
      SFX.click();
      tile.classList.add("used");
      const slot = document.querySelectorAll("#spell-wrap .spell-slot")[this.idx];
      if (slot) { slot.textContent = need; slot.classList.add("filled"); }
      this.idx++;
      this.wrongStreak = 0;
      document.querySelectorAll("#spell-wrap .spell-tile.hint").forEach(t => t.classList.remove("hint"));
      if (this.idx >= this.target.length) this.complete();
    } else {
      SFX.wrong();
      this.wrongStreak++;
      tile.classList.add("wrong");
      setTimeout(() => tile.classList.remove("wrong"), 420);
      if (this.wrongStreak >= 3) {
        // 3번 헤매면 다음 글자 타일을 반짝여서 도와줌
        const next = [...document.querySelectorAll("#spell-wrap .spell-tile:not(.used)")].find(t => t.dataset.l === this.target[this.idx]);
        if (next) next.classList.add("hint");
      }
    }
  },

  complete() {
    SFX.catchOk();
    TTS.speak(this.fullWord);
    fxConfetti(["✨", "⭐", "🎉"], 8);
    const done = this.onDone;
    this.onDone = null;
    setTimeout(() => {
      const w = $("#spell-wrap");
      if (w) w.remove();
      if (done) done();
    }, 950);
  },
};

/* ================================================================
   [S12] 게임 모드 1 — 단어 퀴즈 (한→영 / 영→한 듣기)
================================================================ */
let lastGame = null; // { restart: fn } — 결과 화면 "한 번 더"용

const Quiz = {
  list: [], pool: [], direction: "mix", qdir: null, word: null, hadWrong: false,

  start(cat, direction) {
    Session.reset("quiz", CONFIG.quizRounds);
    SAVE.stats.gamesPlayed.quiz++; saveNow();
    lastGame = { restart: () => Quiz.start(cat, direction) };
    this.direction = direction;
    this.pool = cat ? WORDS.filter(w => w.cat === cat) : WORDS;
    // 복습 우선: 이 풀에서 자주 틀린 단어 최대 3개를 반드시 포함
    const weak = pickN(this.pool.filter(w => isWeakWord(w.id)), 3);
    const rest = shuffle(this.pool.filter(w => !weak.includes(w)));
    let list = shuffle(weak.concat(rest.slice(0, Math.max(0, CONFIG.quizRounds - weak.length))));
    while (list.length < CONFIG.quizRounds) list = list.concat(shuffle(this.pool));
    this.list = list.slice(0, CONFIG.quizRounds);
    showScreen("quiz");
  },

  // 오답 보기: 같은 카테고리 우선 + 부족하면 전체에서
  distractors(word, n) {
    const sameCat = WORDS.filter(w => w.cat === word.cat && w.id !== word.id);
    let picks = pickN(sameCat, n);
    if (picks.length < n) {
      const rest = WORDS.filter(w => w.id !== word.id && !picks.includes(w));
      picks = picks.concat(pickN(rest, n - picks.length));
    }
    return picks;
  },

  question() {
    this.word = this.list[Session.round];
    this.hadWrong = false;
    Session.round++;
    setProgress();

    const listenOk = TTS.ok && SAVE.settings.tts;
    this.qdir = this.direction === "mix"
      ? (listenOk && Math.random() < 0.5 ? "enko" : "koen")
      : (this.direction === "enko" && !listenOk ? "koen2" : this.direction);
    // koen2: TTS 불가 시 대체 — 영어 글자 보고 한글 고르기

    const w = this.word;
    const choices = shuffle([w, ...this.distractors(w, 3)]);
    const box = $("#quiz-box");
    let promptHtml, choicesHtml;

    if (this.qdir === "koen") {
      promptHtml =
        '<div class="prompt-card"><div class="prompt-emoji">' + emojiHtml(w) + "</div>" +
        '<div class="prompt-ko">' + esc(w.ko) + "</div>" +
        '<div class="prompt-hint">영어로 뭘까요?</div></div>';
      // 첫 글자를 파란색으로 강조 — "아, t로 시작하는구나!"
      choicesHtml = choices.map(c =>
        '<button class="choice" data-wid="' + c.id + '"><span class="en"><b class="fl">' + esc(c.en[0]) + "</b>" + esc(c.en.slice(1)) + "</span></button>"
      ).join("");
    } else if (this.qdir === "enko") {
      promptHtml =
        '<div class="prompt-card"><button class="speak-btn" id="q-speak">🔊</button>' +
        '<div class="prompt-hint">잘 듣고 뜻을 골라요! (🔊 다시 듣기)</div></div>';
      choicesHtml = choices.map(c =>
        '<button class="choice" data-wid="' + c.id + '"><span class="em">' + emojiHtml(c) + '</span><span class="ko">' + esc(c.ko) + "</span></button>"
      ).join("");
    } else { // koen2 (듣기 대체: 영어 보고 한글 고르기)
      promptHtml =
        '<div class="prompt-card"><div class="prompt-en">' + esc(w.en) + "</div>" +
        '<div class="prompt-hint">무슨 뜻일까요?</div></div>';
      choicesHtml = choices.map(c =>
        '<button class="choice" data-wid="' + c.id + '"><span class="em">' + emojiHtml(c) + '</span><span class="ko">' + esc(c.ko) + "</span></button>"
      ).join("");
    }

    box.innerHTML = promptHtml + '<div class="choices">' + choicesHtml + "</div>";
    Session.lock = false;

    if (this.qdir === "enko") {
      const sp = $("#q-speak");
      sp.addEventListener("click", () => { SFX.tap(); TTS.speak(w.en); });
      later(() => {
        TTS.speak(w.en);
        later(() => { if (TTS.ok && !speechSynthesis.speaking) sp.classList.add("nudge"); }, 900);
      }, 350);
    }

    box.querySelectorAll(".choice").forEach(c => c.addEventListener("click", (e) => this.answer(e, c)));
  },

  answer(e, btn) {
    if (Session.lock) return;
    const wid = Number(btn.dataset.wid);
    if (wid !== this.word.id) {
      // 오답: 재시도 허용, 첫 시도 보상만 무효
      if (!this.hadWrong) {
        this.hadWrong = true;
        SAVE.stats.totalAnswered++;
        noteWordResult(this.word.id, false);
        breakCombo();
      }
      SFX.wrong();
      btn.classList.add("wrong");
      return;
    }
    Session.lock = true;
    btn.classList.add("right");
    if (!this.hadWrong) {
      SAVE.stats.totalAnswered++;
      noteWordResult(this.word.id, true);
      awardFirstTry(e.clientX, e.clientY);
    } else {
      SFX.correct();
    }
    const w = this.word;
    later(() => {
      const banner = document.createElement("div");
      banner.className = "answer-banner";
      banner.innerHTML = '<div class="be">' + emojiHtml(w) + '</div><div class="bn">' + esc(w.en) + '</div><div class="bk">' + esc(w.ko) + "</div>";
      document.body.appendChild(banner);
      TTS.speak(w.en);
      later(() => {
        banner.remove();
        const proceed = () => {
          if (Session.round >= Session.total) Result.show();
          else this.question();
        };
        // 6자 이하 단어는 스펠링 타일로 철자까지 완성해야 다음 문제로
        if (Spelling.eligible(w)) Spelling.show(w, proceed);
        else proceed();
      }, 1350);
    }, 450);
  },
};

/* ================================================================
   [S14] 게임 모드 2 — 영어 끝말잇기
================================================================ */
const firstLetter = w => w.en[0].toLowerCase();
const lastLetter = w => {
  const s = w.en.toLowerCase().replace(/[^a-z]/g, "");
  return s[s.length - 1];
};
const START_INDEX = {};
WORDS.forEach(w => {
  const f = firstLetter(w);
  (START_INDEX[f] = START_INDEX[f] || []).push(w);
});
// 제시어로 쓸 수 있는 단어: 끝글자로 시작하는 다른 단어가 1개 이상
const chainSafe = w => (START_INDEX[lastLetter(w)] || []).some(c => c.id !== w.id);

const Chain = {
  current: null, used: null, wrongCount: 0, answerWord: null,

  start() {
    Session.reset("chain", CONFIG.chainRounds);
    SAVE.stats.gamesPlayed.chain++; saveNow();
    lastGame = { restart: () => Chain.start() };
    this.used = new Set();
    this.current = this.pickStarter();
    this.used.add(this.current.id);
    showScreen("chain");
  },

  pickStarter() {
    // 이어가기 좋은(끝글자 시작 단어가 4개 이상 남은) 단어에서 랜덤
    const good = WORDS.filter(w =>
      !this.used || !this.used.has(w.id)
    ).filter(w => (START_INDEX[lastLetter(w)] || []).filter(c => c.id !== w.id && (!this.used || !this.used.has(c.id))).length >= 4);
    const pool = good.length ? good : WORDS.filter(w => chainSafe(w));
    return pool[Math.floor(Math.random() * pool.length)];
  },

  candidatesFor(word) {
    return (START_INDEX[lastLetter(word)] || []).filter(c => c.id !== word.id && !this.used.has(c.id));
  },

  question() {
    Session.round++;
    setProgress();
    this.wrongCount = 0;

    let cands = this.candidatesFor(this.current);
    if (!cands.length) {
      // 막힘 → 새 기차 출발
      toast("칙칙폭폭! 새 기차 출발~ 🚂", 1800);
      this.current = this.pickStarter();
      this.used.add(this.current.id);
      this.renderTrain();
      cands = this.candidatesFor(this.current);
    }
    // 1수 앞보기: 다음에도 이어갈 수 있는 후보 우선
    const forward = cands.filter(c =>
      (START_INDEX[lastLetter(c)] || []).some(n => n.id !== c.id && !this.used.has(n.id))
    );
    this.answerWord = (forward.length ? forward : cands)[Math.floor(Math.random() * (forward.length ? forward.length : cands.length))];

    const need = lastLetter(this.current);
    // 오답: 요구 글자로 시작하지 않는 단어, 서로 다른 첫 글자 우선
    const wrongPool = shuffle(WORDS.filter(w =>
      firstLetter(w) !== need && w.id !== this.answerWord.id && !this.used.has(w.id)
    ));
    const wrongs = [];
    const usedLetters = new Set([need]);
    for (const w of wrongPool) {
      if (wrongs.length >= 3) break;
      if (usedLetters.has(firstLetter(w))) continue;
      usedLetters.add(firstLetter(w));
      wrongs.push(w);
    }
    for (const w of wrongPool) { // 부족분 보충
      if (wrongs.length >= 3) break;
      if (!wrongs.includes(w)) wrongs.push(w);
    }

    const cur = this.current;
    const enHtml = (() => {
      const en = esc(cur.en);
      const idx = cur.en.toLowerCase().lastIndexOf(need);
      if (idx < 0) return en;
      return esc(cur.en.slice(0, idx)) + '<span class="chain-last">' + esc(cur.en.slice(idx, idx + 1)) + "</span>" + esc(cur.en.slice(idx + 1));
    })();

    const choices = shuffle([this.answerWord, ...wrongs]);
    $("#chain-box").innerHTML =
      '<div class="prompt-card">' +
        '<button class="speak-btn small" id="c-speak">🔊</button>' +
        '<div class="prompt-emoji">' + emojiHtml(cur) + "</div>" +
        '<div class="prompt-en">' + enHtml + "</div>" +
        '<div class="prompt-ko" style="font-size:17px;color:var(--ink-soft)">' + esc(cur.ko) + "</div>" +
        '<div class="prompt-hint" style="font-size:17px;margin-top:8px">👉 <span class="chain-last" style="font-size:24px;font-weight:900">' + need + "</span> 로 시작하는 단어는?</div>" +
      "</div>" +
      '<div class="choices">' + choices.map(c =>
        '<button class="choice" data-wid="' + c.id + '"><span class="em">' + emojiHtml(c) + '</span><span class="ko" style="font-size:17px">' + esc(c.ko) + "</span></button>"
      ).join("") + "</div>";

    Session.lock = false;
    $("#c-speak").addEventListener("click", () => { SFX.tap(); TTS.speak(cur.en); });
    later(() => TTS.speak(cur.en), 300);
    document.querySelectorAll("#chain-box .choice").forEach(c =>
      c.addEventListener("click", (e) => this.answer(e, c)));
  },

  answer(e, btn) {
    if (Session.lock) return;
    const wid = Number(btn.dataset.wid);
    if (wid !== this.answerWord.id) {
      if (this.wrongCount === 0) {
        SAVE.stats.totalAnswered++;
        noteWordResult(this.answerWord.id, false);
        breakCombo();
      }
      this.wrongCount++;
      SFX.wrong();
      btn.classList.add("wrong");
      if (this.wrongCount >= 2) {
        // 힌트: 남은 보기들의 영어 단어 공개 (첫 글자 강조) — 첫 글자 비교 연습
        document.querySelectorAll("#chain-box .choice:not(.wrong)").forEach(el => {
          if (el.querySelector(".en-hint")) return;
          const w = WORDS.find(x => x.id === Number(el.dataset.wid));
          if (w) el.insertAdjacentHTML("beforeend",
            '<span class="en-hint"><u>' + esc(w.en[0]) + "</u>" + esc(w.en.slice(1)) + "</span>");
        });
      }
      return;
    }
    Session.lock = true;
    btn.classList.add("right");
    if (this.wrongCount === 0) {
      SAVE.stats.totalAnswered++;
      noteWordResult(this.answerWord.id, true);
      awardFirstTry(e.clientX, e.clientY);
    } else {
      SFX.correct();
    }
    const w = this.answerWord;
    TTS.speak(w.en);
    this.current = w;
    this.used.add(w.id);
    this.renderTrain();
    // 정답의 영어 단어를 크게 보여주기 (한글 보기 → 영어 확인 학습)
    later(() => {
      const banner = document.createElement("div");

        const proceed = () => {
          if (Session.round >= Session.total) Result.show();
          else this.question();
        };
        if (Spelling.eligible(w)) Spelling.show(w, proceed);
        else proceed();
      }, 1300);
    }, 400);
  },

  renderTrain() {
    const track = $("#train-track");
    if (!track) return;
    const cars = ['<span class="train-car">🚂</span>'];
    let i = 0;
    this.used.forEach(id => {

      i++;
    });
    track.innerHTML = cars.join("");
    track.scrollLeft = track.scrollWidth;
  },
};

/* ================================================================
   [S15] 게임 모드 3 — 카드 짝맞추기
================================================================ */
const Memory = {
  deck: [], firstPick: null, boardLock: false, failFlips: 0, matchedPairs: 0, pairs: 6, isEasy: true,

  start(cat, opt) {
    this.isEasy = opt !== "hard";
    this.pairs = this.isEasy ? 6 : 8;
    Session.reset("memory", this.pairs);
    SAVE.stats.gamesPlayed.memory++; saveNow();
    lastGame = { restart: () => Memory.start(cat, opt) };

    const pool = cat ? WORDS.filter(w => w.cat === cat) : WORDS;
    const words = pickN(pool, this.pairs);
    this.deck = shuffle(words.flatMap(w => [
      { word: w, type: "en" }, { word: w, type: "ko" },
    ]));
    this.firstPick = null; this.boardLock = false;
    this.failFlips = 0; this.matchedPairs = 0;
    showScreen("memory");
  },

  cardHtml(c, i) {
    const face = c.type === "en"
      ? '<div class="face front t-en"><div class="fw" style="font-size:clamp(13px,4vw,18px)">' + esc(c.word.en) + "</div></div>"
      : '<div class="face front t-ko"><div class="fe">' + emojiHtml(c.word) + '</div><div class="fw">' + esc(c.word.ko) + "</div></div>";
    return '<div class="mcard" data-i="' + i + '"><div class="inner"><div class="face back">❓</div>' + face + "</div></div>";
  },

  render(el) {
    el.innerHTML =
      gameHeadHtml() +
      '<p class="prompt-hint" style="text-align:center;margin-bottom:10px">🔵 영어 카드와 🟢 그림 카드의 짝을 찾아요!</p>' +
      '<div class="memory-grid" id="memory-grid">' +
      this.deck.map((c, i) => this.cardHtml(c, i)).join("") +
      "</div>";

    const grid = $("#memory-grid");
    grid.addEventListener("click", (e) => {
      const cardEl = e.target.closest(".mcard");
      if (cardEl) this.pick(cardEl);
    });

    if (this.isEasy) {
      // 쉬움: 2초 미리보기
      this.boardLock = true;
      later(() => {
        grid.querySelectorAll(".mcard").forEach(c => c.classList.add("flip"));
        SFX.flip();
      }, 500);
      later(() => {
        grid.querySelectorAll(".mcard").forEach(c => c.classList.remove("flip"));
        this.boardLock = false;
      }, 2600);
    }
  },

  pick(cardEl) {
    if (this.boardLock) return;
    if (cardEl.classList.contains("flip") || cardEl.classList.contains("matched")) return;
    SFX.flip();
    cardEl.classList.add("flip");
    const card = this.deck[Number(cardEl.dataset.i)];

    if (!this.firstPick) {
      this.firstPick = { el: cardEl, card };
      return;
    }
    const a = this.firstPick; this.firstPick = null;
    const match = a.card.word.id === card.word.id && a.card.type !== card.type;
    if (match) {
      a.el.classList.add("matched");
      cardEl.classList.add("matched");
      this.matchedPairs++;
      Session.round = this.matchedPairs;
      setProgress();
      SAVE.stats.totalAnswered++;
      const r = cardEl.getBoundingClientRect();
      awardFirstTry(r.left + r.width / 2, r.top);
      TTS.speak(card.word.en);
      if (this.matchedPairs >= this.pairs) later(() => this.finish(), 900);
    } else {
      this.boardLock = true;
      this.failFlips++;
      breakCombo();
      later(() => SFX.wrong(), 350);
      later(() => {
        a.el.classList.remove("flip");
        cardEl.classList.remove("flip");
        this.boardLock = false;
      }, 950);
    }
  },

  finish() {
    let extra = "";
    if (this.failFlips <= CONFIG.memoryPerfectSlack) {
      addCoins(CONFIG.perfectBonus);
      SFX.combo();
      extra = "<br>🏅 <b>퍼펙트!</b> 보너스 코인 +" + CONFIG.perfectBonus;
      fxConfetti(["🏅","✨","🎉"]);
    }
    Result.show(extra);
  },
};
